<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 700">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="30" y="40" fill="white" font-size="16" font-weight="700">第一次使用 Claude Code：五步流程</text>
  <text x="30" y="59" fill="#94a3b8" font-size="10">从建项目到改代码，照着敲就行；两处高亮是「先问后动」和「后悔药」</text>

  <!-- 入口 -->
  <rect x="195" y="78" width="170" height="40" rx="20" fill="#0f172a"/>
  <rect x="195" y="78" width="170" height="40" rx="20" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="280" y="103" fill="white" font-size="12" font-weight="600" text-anchor="middle">打开终端</text>
  <line x1="280" y1="118" x2="280" y2="146" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 步骤 1：建玩具项目 -->
  <rect x="180" y="148" width="200" height="64" rx="6" fill="#0f172a"/>
  <rect x="180" y="148" width="200" height="64" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="202" cy="170" r="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="202" y="174" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">1</text>
  <text x="296" y="175" fill="white" font-size="12.5" font-weight="600" text-anchor="middle">建玩具项目</text>
  <text x="280" y="196" fill="#94a3b8" font-size="9" text-anchor="middle">mkdir + cd + 建 main.py</text>
  <line x1="280" y1="212" x2="280" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 步骤 2：项目目录里启动 claude -->
  <rect x="180" y="242" width="200" height="64" rx="6" fill="#0f172a"/>
  <rect x="180" y="242" width="200" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="202" cy="264" r="10" fill="#0f172a" stroke="#34d399" stroke-width="1.2"/>
  <text x="202" y="268" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">2</text>
  <text x="298" y="269" fill="white" font-size="12.5" font-weight="600" text-anchor="middle">在项目目录里启动</text>
  <text x="280" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">敲 claude · 你在哪启动它读哪儿</text>
  <line x1="280" y1="306" x2="280" y2="334" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 步骤 3：让它解释代码（零风险） -->
  <rect x="180" y="336" width="200" height="64" rx="6" fill="#0f172a"/>
  <rect x="180" y="336" width="200" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="202" cy="358" r="10" fill="#0f172a" stroke="#34d399" stroke-width="1.2"/>
  <text x="202" y="362" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">3</text>
  <text x="296" y="363" fill="white" font-size="12.5" font-weight="600" text-anchor="middle">让它解释代码</text>
  <text x="280" y="384" fill="#94a3b8" font-size="9" text-anchor="middle">只读不改 · 先确认它读到了文件</text>
  <!-- 零风险 徽标 -->
  <rect x="392" y="356" width="64" height="24" rx="12" fill="#0f172a"/>
  <rect x="392" y="356" width="64" height="24" rx="12" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="424" y="372" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">零风险</text>
  <line x1="280" y1="400" x2="280" y2="428" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 步骤 4：让它改代码（先给 diff 等批准）—— 高亮 amber -->
  <rect x="180" y="430" width="200" height="72" rx="6" fill="#0f172a"/>
  <rect x="180" y="430" width="200" height="72" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="202" cy="453" r="10" fill="#0f172a" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="202" y="457" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">4</text>
  <text x="296" y="458" fill="white" font-size="12.5" font-weight="600" text-anchor="middle">让它改代码</text>
  <text x="280" y="479" fill="#fde68a" font-size="9.5" font-weight="600" text-anchor="middle">先给 diff，停下来等你批准</text>
  <text x="280" y="494" fill="#94a3b8" font-size="9" text-anchor="middle">看懂红 − 绿 ＋ 再选「同意」</text>
  <!-- 先问后动 旁标 -->
  <rect x="392" y="448" width="78" height="38" rx="8" fill="#0f172a"/>
  <rect x="392" y="448" width="78" height="38" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="431" y="464" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">先问后动</text>
  <text x="431" y="478" fill="#fbbf24" font-size="8" text-anchor="middle">不会偷改</text>
  <line x1="280" y1="502" x2="280" y2="530" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 步骤 5：改错了用 /rewind 回溯 —— 高亮 rose -->
  <rect x="180" y="532" width="200" height="72" rx="6" fill="#0f172a"/>
  <rect x="180" y="532" width="200" height="72" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="2"/>
  <circle cx="202" cy="555" r="10" fill="#0f172a" stroke="#fb7185" stroke-width="1.2"/>
  <text x="202" y="559" fill="#fb7185" font-size="11" font-weight="700" text-anchor="middle">5</text>
  <text x="300" y="560" fill="white" font-size="12.5" font-weight="600" text-anchor="middle">改错了能反悔</text>
  <text x="280" y="581" fill="#fecdd3" font-size="9.5" font-weight="600" text-anchor="middle">/rewind 回溯 · 或空输入框双击 Esc</text>
  <text x="280" y="596" fill="#94a3b8" font-size="9" text-anchor="middle">检查点是本地撤销，Git 才是永久历史</text>
  <!-- 后悔药 旁标 -->
  <rect x="392" y="550" width="78" height="38" rx="8" fill="#0f172a"/>
  <rect x="392" y="550" width="78" height="38" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="431" y="566" fill="#fb7185" font-size="10" font-weight="700" text-anchor="middle">后悔药</text>
  <text x="431" y="580" fill="#fb7185" font-size="8" text-anchor="middle">随时跳回</text>

  <!-- 图例 -->
  <text x="30" y="648" fill="#94a3b8" font-size="9" font-weight="600">图例</text>
  <rect x="70" y="640" width="14" height="11" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="90" y="649" fill="#94a3b8" font-size="9">只读 / 安全</text>
  <rect x="180" y="640" width="14" height="11" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="200" y="649" fill="#94a3b8" font-size="9">会改文件 · 需批准</text>
  <rect x="335" y="640" width="14" height="11" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="355" y="649" fill="#94a3b8" font-size="9">兜底 / 反悔</text>
</svg>
