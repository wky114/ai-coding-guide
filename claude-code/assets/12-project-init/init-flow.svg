<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1210 360">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="30" y="40" fill="white" font-size="16" font-weight="700">/init 一键初始化</text>
  <text x="30" y="60" fill="#94a3b8" font-size="10">从启动到一份 CLAUDE.md 草稿，就五步</text>

  <!-- 阶段条：自动 / 人工 -->
  <rect x="30" y="86" width="908" height="22" rx="6" fill="#0f172a"/>
  <rect x="30" y="86" width="908" height="22" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="484" y="101" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">前 4 步全自动，你只管看</text>

  <rect x="950" y="86" width="230" height="22" rx="6" fill="#0f172a"/>
  <rect x="950" y="86" width="230" height="22" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1065" y="101" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">第 5 步该你出手了</text>

  <!-- 连线（节点之间）。先画线，节点底 rect 会盖住端点 -->
  <line x1="230" y1="180" x2="270" y2="180" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="466" y1="180" x2="506" y2="180" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="702" y1="180" x2="742" y2="180" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="938" y1="180" x2="978" y2="180" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- ① 启动 claude -->
  <rect x="30" y="130" width="200" height="100" rx="6" fill="#0f172a"/>
  <rect x="30" y="130" width="200" height="100" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="54" cy="154" r="11" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="54" y="158" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">1</text>
  <rect x="158" y="143" width="56" height="20" rx="10" fill="#0f172a"/>
  <rect x="158" y="143" width="56" height="20" rx="10" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="186" y="157" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">自动</text>
  <text x="130" y="186" fill="white" font-size="13" font-weight="600" text-anchor="middle">在项目目录启动</text>
  <text x="130" y="208" fill="#94a3b8" font-size="9.5" text-anchor="middle">cd 进项目，敲 claude</text>

  <!-- ② 敲 /init -->
  <rect x="266" y="130" width="200" height="100" rx="6" fill="#0f172a"/>
  <rect x="266" y="130" width="200" height="100" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="290" cy="154" r="11" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="290" y="158" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">2</text>
  <rect x="394" y="143" width="56" height="20" rx="10" fill="#0f172a"/>
  <rect x="394" y="143" width="56" height="20" rx="10" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="422" y="157" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">自动</text>
  <text x="366" y="186" fill="white" font-size="13" font-weight="600" text-anchor="middle">敲 /init 命令</text>
  <text x="366" y="208" fill="#94a3b8" font-size="9.5" text-anchor="middle">一行斜杠命令就触发</text>

  <!-- ③ 扫描项目、识别技术栈 -->
  <rect x="502" y="130" width="200" height="100" rx="6" fill="#0f172a"/>
  <rect x="502" y="130" width="200" height="100" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="526" cy="154" r="11" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="526" y="158" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">3</text>
  <rect x="630" y="143" width="56" height="20" rx="10" fill="#0f172a"/>
  <rect x="630" y="143" width="56" height="20" rx="10" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="658" y="157" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">自动</text>
  <text x="602" y="186" fill="white" font-size="13" font-weight="600" text-anchor="middle">扫描结构、认技术栈</text>
  <text x="602" y="208" fill="#94a3b8" font-size="9.5" text-anchor="middle">读目录、配置、依赖文件</text>

  <!-- ④ 落盘 CLAUDE.md 草稿 -->
  <rect x="738" y="130" width="200" height="100" rx="6" fill="#0f172a"/>
  <rect x="738" y="130" width="200" height="100" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="762" cy="154" r="11" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="762" y="158" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">4</text>
  <rect x="866" y="143" width="56" height="20" rx="10" fill="#0f172a"/>
  <rect x="866" y="143" width="56" height="20" rx="10" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="894" y="157" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">自动</text>
  <text x="838" y="186" fill="white" font-size="13" font-weight="600" text-anchor="middle">落盘草稿</text>
  <text x="838" y="208" fill="#94a3b8" font-size="9.5" text-anchor="middle">生成 CLAUDE.md 初稿</text>

  <!-- ⑤ 人工微调补全（绿色高亮） -->
  <rect x="978" y="130" width="202" height="100" rx="6" fill="#0f172a"/>
  <rect x="978" y="130" width="202" height="100" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <circle cx="1002" cy="154" r="11" fill="#0f172a" stroke="#34d399" stroke-width="1.2"/>
  <text x="1002" y="158" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">5</text>
  <rect x="1108" y="143" width="56" height="20" rx="10" fill="#0f172a"/>
  <rect x="1108" y="143" width="56" height="20" rx="10" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="1136" y="157" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">人工</text>
  <text x="1079" y="186" fill="white" font-size="13" font-weight="600" text-anchor="middle">微调补全</text>
  <text x="1079" y="208" fill="#a7f3d0" font-size="9.5" font-weight="600" text-anchor="middle">补规范、删冗余、定细节</text>

  <!-- 产物提示：草稿 → 你的手册 -->
  <text x="1079" y="256" fill="#34d399" font-size="9.5" font-weight="600" text-anchor="middle">草稿只是起点，越用越准</text>

  <!-- 图例 -->
  <text x="30" y="324" fill="#94a3b8" font-size="9" font-weight="600">图例</text>
  <rect x="70" y="316" width="14" height="11" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="90" y="325" fill="#94a3b8" font-size="9">青色：Claude 自动完成</text>
  <rect x="250" y="316" width="14" height="11" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="270" y="325" fill="#94a3b8" font-size="9">绿色：需要你动手</text>
</svg>
