<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#34d399"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">从需求出发，挑该用哪个扩展点</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">几个二选一层层分叉，走到叶子就是该用的那个</text>

  <!-- ============================================================ -->
  <!-- 主轴居中 cx=300（决策链竖向下行），是→右出叶子           -->
  <!-- ============================================================ -->

  <!-- 主轴竖向连线（贯穿所有 否 路径）：start底→Q1→Q2→Q3→Q4 -->
  <line x1="300" y1="138" x2="300" y2="166" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="300" y1="246" x2="300" y2="286" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="300" y1="366" x2="300" y2="406" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="300" y1="486" x2="300" y2="526" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 否 标签（主轴上，每段一处） -->
  <text x="312" y="158" fill="#94a3b8" font-size="9" font-weight="600">否</text>
  <text x="312" y="278" fill="#94a3b8" font-size="9" font-weight="600">否</text>
  <text x="312" y="398" fill="#94a3b8" font-size="9" font-weight="600">否</text>

  <!-- ===== 起点：我有个需求 ===== -->
  <rect x="200" y="92" width="200" height="46" rx="23" fill="#0f172a"/>
  <rect x="200" y="92" width="200" height="46" rx="23" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="300" y="120" fill="white" font-size="13" font-weight="600" text-anchor="middle">我有个需求</text>

  <!-- ===== Q1 决策 ===== -->
  <g transform="translate(300,206)">
    <polygon points="0,-40 130,0 0,40 -130,0" fill="#0f172a"/>
    <polygon points="0,-40 130,0 0,40 -130,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="4" fill="white" font-size="11" font-weight="600" text-anchor="middle">要连外部服务 / 数据？</text>
  </g>
  <!-- Q1 是 → 右出 -->
  <line x1="430" y1="206" x2="700" y2="206" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <text x="446" y="198" fill="#34d399" font-size="9" font-weight="600">是</text>

  <!-- ===== Q2 决策 ===== -->
  <g transform="translate(300,326)">
    <polygon points="0,-40 130,0 0,40 -130,0" fill="#0f172a"/>
    <polygon points="0,-40 130,0 0,40 -130,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="-4" fill="white" font-size="11" font-weight="600" text-anchor="middle">要每次都成立、</text>
    <text x="0" y="14" fill="white" font-size="11" font-weight="600" text-anchor="middle">不能靠自觉？</text>
  </g>
  <!-- Q2 是 → 右出 -->
  <line x1="430" y1="326" x2="700" y2="326" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <text x="446" y="318" fill="#34d399" font-size="9" font-weight="600">是</text>

  <!-- ===== Q3 决策 ===== -->
  <g transform="translate(300,446)">
    <polygon points="0,-40 130,0 0,40 -130,0" fill="#0f172a"/>
    <polygon points="0,-40 130,0 0,40 -130,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="-4" fill="white" font-size="11" font-weight="600" text-anchor="middle">一次性脏活、</text>
    <text x="0" y="14" fill="white" font-size="11" font-weight="600" text-anchor="middle">想隔离 / 并行？</text>
  </g>
  <!-- Q3 是 → 右出 -->
  <line x1="430" y1="446" x2="700" y2="446" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <text x="446" y="438" fill="#34d399" font-size="9" font-weight="600">是</text>

  <!-- ===== Q4 决策（二选一：每次都看到 vs 按需才看） ===== -->
  <g transform="translate(300,566)">
    <polygon points="0,-40 130,0 0,40 -130,0" fill="#0f172a"/>
    <polygon points="0,-40 130,0 0,40 -130,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="-4" fill="white" font-size="11" font-weight="600" text-anchor="middle">每次都要看到，</text>
    <text x="0" y="14" fill="white" font-size="11" font-weight="600" text-anchor="middle">还是需要时才看？</text>
  </g>

  <!-- Q4「每次都看到」→ 左下叶子 CLAUDE.md -->
  <path d="M 220 600 L 150 600 L 150 654" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="120" y="628" fill="#94a3b8" font-size="9" font-weight="600">每次都看到</text>

  <!-- Q4「需要时才看」→ 竖直落到分叉横梁（接点，不带箭头） -->
  <line x1="300" y1="606" x2="300" y2="666" stroke="#64748b" stroke-width="1.6"/>
  <text x="312" y="640" fill="#94a3b8" font-size="9" font-weight="600">需要时才看</text>

  <!-- ============================================================ -->
  <!-- 右侧三个「是」叶子：MCP / Hook / Subagent，居右 cx=820     -->
  <!-- ============================================================ -->

  <!-- 叶子 MCP（Q1 是） -->
  <rect x="700" y="180" width="240" height="52" rx="8" fill="#0f172a"/>
  <rect x="700" y="180" width="240" height="52" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="820" y="202" fill="white" font-size="13" font-weight="700" text-anchor="middle">MCP</text>
  <text x="820" y="220" fill="#cbd5e1" font-size="9" text-anchor="middle">接外部服务 / 数据的统一插口</text>

  <!-- 叶子 Hook / 权限规则（Q2 是） -->
  <rect x="700" y="300" width="240" height="52" rx="8" fill="#0f172a"/>
  <rect x="700" y="300" width="240" height="52" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="820" y="322" fill="white" font-size="13" font-weight="700" text-anchor="middle">Hook / 权限规则</text>
  <text x="820" y="340" fill="#cbd5e1" font-size="9" text-anchor="middle">强制卡点，不靠 Claude 自觉</text>

  <!-- 叶子 Subagent（Q3 是） -->
  <rect x="700" y="420" width="240" height="52" rx="8" fill="#0f172a"/>
  <rect x="700" y="420" width="240" height="52" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="820" y="442" fill="white" font-size="13" font-weight="700" text-anchor="middle">Subagent</text>
  <text x="820" y="460" fill="#cbd5e1" font-size="9" text-anchor="middle">独立上下文，脏活隔离 / 并行</text>

  <!-- ============================================================ -->
  <!-- 底部三个 Q4 叶子：CLAUDE.md / Skill / slash command         -->
  <!-- ============================================================ -->

  <!-- 叶子 CLAUDE.md（每次都看到） -->
  <rect x="40" y="654" width="220" height="58" rx="8" fill="#0f172a"/>
  <rect x="40" y="654" width="220" height="58" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="678" fill="white" font-size="13" font-weight="700" text-anchor="middle">CLAUDE.md</text>
  <text x="150" y="697" fill="#cbd5e1" font-size="9" text-anchor="middle">每次都看到的规矩</text>

  <!-- 「需要时才看」再分：被动按需（Skill）/ 主动一键（slash command） -->
  <!-- 分叉横梁：从主轴接点 x=300 拉到 x=700 -->
  <line x1="300" y1="666" x2="700" y2="666" stroke="#64748b" stroke-width="1.6"/>
  <line x1="450" y1="666" x2="450" y2="684" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="700" y1="666" x2="700" y2="684" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="468" y="660" fill="#94a3b8" font-size="9" font-weight="600">被动按需查</text>
  <text x="638" y="660" fill="#94a3b8" font-size="9" font-weight="600">主动一键触发</text>

  <!-- 叶子 Skill（被动按需） -->
  <rect x="340" y="684" width="220" height="58" rx="8" fill="#0f172a"/>
  <rect x="340" y="684" width="220" height="58" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="450" y="708" fill="white" font-size="13" font-weight="700" text-anchor="middle">Skill</text>
  <text x="450" y="727" fill="#cbd5e1" font-size="9" text-anchor="middle">按需才查的知识 / 流程</text>

  <!-- 叶子 slash command（主动一键） -->
  <rect x="590" y="684" width="220" height="58" rx="8" fill="#0f172a"/>
  <rect x="590" y="684" width="220" height="58" rx="8" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="700" y="708" fill="white" font-size="13" font-weight="700" text-anchor="middle">slash command</text>
  <text x="700" y="727" fill="#cbd5e1" font-size="9" text-anchor="middle">主动一键触发的流程</text>

  <!-- 右侧说明：是→叶子 / 否→下一问 -->
  <text x="1080" y="566" fill="#64748b" font-size="9" text-anchor="end">每层「是」就停，向右取叶子；</text>
  <text x="1080" y="582" fill="#64748b" font-size="9" text-anchor="end">「否」就继续往下问下一个。</text>

  <!-- 底部一句话 -->
  <text x="40" y="752" fill="#64748b" font-size="9">先问外部连接，再问硬约束，再问隔离，最后按「看到的时机」在 CLAUDE.md / Skill / slash command 里选。</text>
</svg>
