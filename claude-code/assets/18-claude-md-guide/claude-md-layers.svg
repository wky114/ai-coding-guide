<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#fbbf24"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="30" y="40" fill="white" font-size="16" font-weight="700">CLAUDE.md 的三层</text>
  <text x="30" y="59" fill="#94a3b8" font-size="10">拼接不覆盖，越近越晚读、冲突时占优</text>

  <!-- ========== 三层栈：从上到下叠加，每层略向右下偏移，呈「叠在一起」状 ========== -->
  <!-- 公共参数：width=440，height=96，每层行距 130，x 递增 24 制造叠层感 -->

  <!-- 第 1 层 顶层：用户级（灰，最先读·管全局·最弱） -->
  <rect x="56" y="100" width="440" height="96" rx="8" fill="#0f172a"/>
  <rect x="56" y="100" width="440" height="96" rx="8" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="88" cy="132" r="14" fill="#0f172a" stroke="#64748b" stroke-width="1.4"/>
  <text x="88" y="137" fill="#cbd5e1" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="116" y="129" fill="#cbd5e1" font-size="13" font-weight="600">用户级</text>
  <text x="116" y="150" fill="#94a3b8" font-size="11">~/.claude/CLAUDE.md</text>
  <text x="116" y="178" fill="#64748b" font-size="10">所有项目共享，跟着你这个人走</text>
  <!-- 右侧标签 -->
  <rect x="356" y="116" width="124" height="22" rx="11" fill="#0f172a"/>
  <rect x="356" y="116" width="124" height="22" rx="11" fill="rgba(30,41,59,0.6)" stroke="#64748b" stroke-width="1.1"/>
  <text x="418" y="131" fill="#cbd5e1" font-size="10" font-weight="600" text-anchor="middle">最先读 · 管全局</text>
  <text x="480" y="178" fill="#64748b" font-size="10" font-weight="600" text-anchor="end">优先级最弱</text>

  <!-- 第 2 层 中层：项目级（青，团队共享·进 git） -->
  <rect x="80" y="230" width="440" height="96" rx="8" fill="#0f172a"/>
  <rect x="80" y="230" width="440" height="96" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="112" cy="262" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="1.4"/>
  <text x="112" y="267" fill="#67e8f9" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="140" y="259" fill="white" font-size="13" font-weight="600">项目级</text>
  <text x="140" y="280" fill="#94a3b8" font-size="11">./CLAUDE.md</text>
  <text x="140" y="308" fill="#7dd3fc" font-size="10">放在项目根目录，整个仓库共用</text>
  <!-- 右侧标签 -->
  <rect x="378" y="246" width="126" height="22" rx="11" fill="#0f172a"/>
  <rect x="378" y="246" width="126" height="22" rx="11" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.1"/>
  <text x="441" y="261" fill="#67e8f9" font-size="10" font-weight="600" text-anchor="middle">团队共享 · 进 git</text>
  <text x="504" y="308" fill="#67e8f9" font-size="10" font-weight="600" text-anchor="end">夹在中间</text>

  <!-- 第 3 层 底层：子目录级（绿，最贴近·最晚读·冲突时占优） -->
  <rect x="104" y="360" width="440" height="100" rx="8" fill="#0f172a"/>
  <rect x="104" y="360" width="440" height="100" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <circle cx="136" cy="394" r="14" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="136" y="399" fill="#6ee7b7" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="164" y="391" fill="white" font-size="13" font-weight="600">子目录级</text>
  <text x="164" y="412" fill="#94a3b8" font-size="11">./sub/CLAUDE.md</text>
  <text x="164" y="440" fill="#6ee7b7" font-size="10">只在该子目录里生效，离代码最近</text>
  <!-- 右侧标签：冲突时占优 -->
  <rect x="372" y="376" width="146" height="22" rx="11" fill="#0f172a"/>
  <rect x="372" y="376" width="146" height="22" rx="11" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.2"/>
  <text x="445" y="391" fill="#6ee7b7" font-size="10" font-weight="700" text-anchor="middle">✓ 冲突时占优</text>
  <text x="518" y="440" fill="#6ee7b7" font-size="10" font-weight="600" text-anchor="end">最贴近 · 最晚读</text>

  <!-- ========== 右侧：加载顺序 纵向箭头（从上到下） ========== -->
  <line x1="596" y1="110" x2="596" y2="450" stroke="#fbbf24" stroke-width="1.8" stroke-dasharray="6,5" marker-end="url(#arrow-amber)"/>
  <text x="588" y="280" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle" transform="rotate(90 588,280)">加载顺序：自上而下</text>
  <!-- 上端「先」下端「后」 -->
  <text x="596" y="100" fill="#94a3b8" font-size="9" text-anchor="middle">先读</text>
  <text x="596" y="472" fill="#94a3b8" font-size="9" text-anchor="middle">后读</text>

  <!-- ========== 底部规则说明：拼接不覆盖 ========== -->
  <rect x="56" y="500" width="488" height="62" rx="8" fill="#0f172a"/>
  <rect x="56" y="500" width="488" height="62" rx="8" fill="rgba(120,53,15,0.28)" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="300" y="525" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">三层拼在一起，不是互相覆盖</text>
  <text x="300" y="547" fill="#cbd5e1" font-size="10" text-anchor="middle">三份内容前后拼接同时生效；同一条规则起冲突时，越晚读的越靠后、说了算</text>
</svg>
