<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 730">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#fbbf24"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="38" fill="white" font-size="16" font-weight="700">插件用法两步走，一个插件打包五类组件</text>
  <text x="26" y="58" fill="#94a3b8" font-size="10">先加市场再装插件，装好 /reload-plugins 生效；插件名成命名空间前缀</text>

  <!-- ============================================================ -->
  <!-- 第一行：两步走流程（加市场 → 装插件 → 装好了）              -->
  <!-- ============================================================ -->
  <text x="26" y="96" fill="#60a5fa" font-size="11" font-weight="700">用法：两步走</text>

  <!-- 第一步：加市场 -->
  <rect x="26" y="108" width="300" height="74" rx="8" fill="#0f172a"/>
  <rect x="26" y="108" width="300" height="74" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="44" y="132" fill="#22d3ee" font-size="11" font-weight="700">第一步 · 加市场</text>
  <text x="44" y="152" fill="white" font-size="11" font-weight="600">/plugin marketplace add</text>
  <text x="44" y="170" fill="#94a3b8" font-size="9">把一个插件来源（仓库）挂进来</text>

  <!-- 箭头：加市场 → 装插件 -->
  <path d="M 332 145 L 396 145" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- 第二步：装插件 -->
  <rect x="402" y="108" width="300" height="74" rx="8" fill="#0f172a"/>
  <rect x="402" y="108" width="300" height="74" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="420" y="132" fill="#22d3ee" font-size="11" font-weight="700">第二步 · 装插件</text>
  <text x="420" y="152" fill="white" font-size="11" font-weight="600">/plugin install xxx@市场</text>
  <text x="420" y="170" fill="#94a3b8" font-size="9">从某个市场把具体插件装下来</text>

  <!-- 箭头：装插件 → 装好了 -->
  <path d="M 708 145 L 772 145" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- 装好了 -->
  <rect x="778" y="108" width="296" height="74" rx="8" fill="#0f172a"/>
  <rect x="778" y="108" width="296" height="74" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="796" y="132" fill="#34d399" font-size="11" font-weight="700">装好了</text>
  <text x="796" y="152" fill="white" font-size="11" font-weight="600">/reload-plugins 生效</text>
  <text x="796" y="170" fill="#94a3b8" font-size="9">不必重启，组件立刻可用</text>

  <!-- 装好后向下引到「插件盒子」 -->
  <path d="M 926 182 L 926 218 L 550 218 L 550 252" fill="none" stroke="#475569" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="640" y="212" fill="#64748b" font-size="9">装下来的，是这么一个盒子 ↓</text>

  <!-- ============================================================ -->
  <!-- 插件盒子（虚线容器）= plugin.json + 五类组件                 -->
  <!-- ============================================================ -->
  <rect x="26" y="256" width="1048" height="346" rx="14" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="44" y="282" fill="#fbbf24" font-size="12" font-weight="700">一个插件盒子 = plugin.json ＋ 五类组件</text>
  <text x="780" y="282" fill="#94a3b8" font-size="9" text-anchor="start">装哪几类、由作者打包，你照单全收</text>

  <!-- plugin.json：清单条（横贯顶部） -->
  <rect x="48" y="298" width="1004" height="44" rx="8" fill="#0f172a"/>
  <rect x="48" y="298" width="1004" height="44" rx="8" fill="rgba(120,53,15,0.28)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="68" y="319" fill="white" font-size="11" font-weight="700">plugin.json · 插件清单</text>
  <text x="68" y="334" fill="#cbd5e1" font-size="9">写明插件名 / 版本 / 描述，插件名就是后面命令的命名空间前缀</text>
  <text x="1032" y="325" fill="#fbbf24" font-size="9" text-anchor="end">盒子的「身份证」</text>

  <!-- 从清单往下分叉到五类组件的连接线 -->
  <path d="M 156 342 L 156 364 L 156 384" fill="none" stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow-amber)"/>
  <path d="M 550 342 L 550 384" fill="none" stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow-amber)"/>
  <path d="M 944 342 L 944 384" fill="none" stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow-amber)"/>

  <!-- 五类组件：一排五张卡，x 起点 48，卡宽 188，间距 16 -->
  <!-- 卡顶 y=388，卡高 192 -->

  <!-- ① Skills / Commands（cyan，主动喊） -->
  <rect x="48" y="388" width="188" height="192" rx="9" fill="#0f172a"/>
  <rect x="48" y="388" width="188" height="192" rx="9" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="142" y="416" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">①</text>
  <text x="142" y="440" fill="white" font-size="11" font-weight="700" text-anchor="middle">Skills</text>
  <text x="142" y="457" fill="white" font-size="11" font-weight="700" text-anchor="middle">Commands</text>
  <line x1="74" y1="472" x2="210" y2="472" stroke="#1e3a4a" stroke-width="1"/>
  <text x="142" y="494" fill="#cbd5e1" font-size="9" text-anchor="middle">你主动喊</text>
  <text x="142" y="512" fill="#94a3b8" font-size="9" text-anchor="middle">敲 /命令 触发</text>
  <text x="142" y="530" fill="#94a3b8" font-size="9" text-anchor="middle">Skills 也能被</text>
  <text x="142" y="546" fill="#94a3b8" font-size="9" text-anchor="middle">Claude 自动用</text>
  <text x="142" y="568" fill="#64748b" font-size="8" text-anchor="middle">最常打包的一类</text>

  <!-- ② Subagents（emerald，自动派 / 手动点） -->
  <rect x="252" y="388" width="188" height="192" rx="9" fill="#0f172a"/>
  <rect x="252" y="388" width="188" height="192" rx="9" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="346" y="416" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle">②</text>
  <text x="346" y="442" fill="white" font-size="11" font-weight="700" text-anchor="middle">Subagents</text>
  <line x1="278" y1="458" x2="414" y2="458" stroke="#1e3a3a" stroke-width="1"/>
  <text x="346" y="480" fill="#cbd5e1" font-size="9" text-anchor="middle">专项小弟</text>
  <text x="346" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">Claude 看任务</text>
  <text x="346" y="516" fill="#94a3b8" font-size="9" text-anchor="middle">自动派</text>
  <text x="346" y="536" fill="#94a3b8" font-size="9" text-anchor="middle">也能 /agents</text>
  <text x="346" y="552" fill="#94a3b8" font-size="9" text-anchor="middle">里手动点</text>

  <!-- ③ Hooks（orange，事件自动触发） -->
  <rect x="456" y="388" width="188" height="192" rx="9" fill="#0f172a"/>
  <rect x="456" y="388" width="188" height="192" rx="9" fill="rgba(251,146,60,0.22)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="550" y="416" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle">③</text>
  <text x="550" y="442" fill="white" font-size="11" font-weight="700" text-anchor="middle">Hooks</text>
  <line x1="482" y1="458" x2="618" y2="458" stroke="#4a2e1a" stroke-width="1"/>
  <text x="550" y="480" fill="#cbd5e1" font-size="9" text-anchor="middle">事件自动触发</text>
  <text x="550" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">命中某事件</text>
  <text x="550" y="516" fill="#94a3b8" font-size="9" text-anchor="middle">就自动跑</text>
  <text x="550" y="536" fill="#94a3b8" font-size="9" text-anchor="middle">写完自动 lint</text>
  <text x="550" y="552" fill="#94a3b8" font-size="9" text-anchor="middle">这类卡点</text>

  <!-- ④ MCP server（violet，自动启动） -->
  <rect x="660" y="388" width="188" height="192" rx="9" fill="#0f172a"/>
  <rect x="660" y="388" width="188" height="192" rx="9" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="754" y="416" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">④</text>
  <text x="754" y="442" fill="white" font-size="11" font-weight="700" text-anchor="middle">MCP server</text>
  <line x1="686" y1="458" x2="822" y2="458" stroke="#2e2150" stroke-width="1"/>
  <text x="754" y="480" fill="#cbd5e1" font-size="9" text-anchor="middle">自动启动</text>
  <text x="754" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">启用插件就拉起</text>
  <text x="754" y="516" fill="#94a3b8" font-size="9" text-anchor="middle">外部工具 / 服务</text>
  <text x="754" y="536" fill="#94a3b8" font-size="9" text-anchor="middle">直接进工具箱</text>
  <text x="754" y="556" fill="#64748b" font-size="8" text-anchor="middle">不用手动连</text>

  <!-- ⑤ LSP server（amber，实时代码智能） -->
  <rect x="864" y="388" width="188" height="192" rx="9" fill="#0f172a"/>
  <rect x="864" y="388" width="188" height="192" rx="9" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="958" y="416" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">⑤</text>
  <text x="958" y="442" fill="white" font-size="11" font-weight="700" text-anchor="middle">LSP server</text>
  <line x1="890" y1="458" x2="1026" y2="458" stroke="#4a3a1a" stroke-width="1"/>
  <text x="958" y="480" fill="#cbd5e1" font-size="9" text-anchor="middle">实时代码智能</text>
  <text x="958" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">边写边看</text>
  <text x="958" y="516" fill="#94a3b8" font-size="9" text-anchor="middle">报错 / 跳定义</text>
  <text x="958" y="536" fill="#94a3b8" font-size="9" text-anchor="middle">语言服务器</text>
  <text x="958" y="556" fill="#64748b" font-size="8" text-anchor="middle">需另装二进制</text>

  <!-- ============================================================ -->
  <!-- 底部：命名空间命令 + 一句话                                  -->
  <!-- ============================================================ -->
  <!-- 命名空间命令条 -->
  <rect x="26" y="630" width="668" height="56" rx="8" fill="#0f172a"/>
  <rect x="26" y="630" width="668" height="56" rx="8" fill="rgba(59,130,246,0.22)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="46" y="654" fill="#60a5fa" font-size="11" font-weight="700">叫插件里的 skill：带命名空间前缀</text>
  <text x="46" y="675" fill="white" font-size="12" font-weight="700">/插件名:skill名</text>
  <text x="320" y="675" fill="#94a3b8" font-size="9">前缀防撞名，多个插件有同名 skill 也不打架</text>

  <!-- 右下角小结 -->
  <rect x="710" y="630" width="364" height="56" rx="8" fill="#0f172a"/>
  <rect x="710" y="630" width="364" height="56" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="730" y="652" fill="#cbd5e1" font-size="9">①② 你能看见、能喊；</text>
  <text x="730" y="668" fill="#cbd5e1" font-size="9">③④⑤ 多在后台默默干，启用即生效。</text>

  <!-- 底部一句话 -->
  <text x="26" y="712" fill="#64748b" font-size="9">一句话：插件就是把这五类组件＋一张清单打成一个包，加市场、装插件两步到位——不用你一个个手动配。</text>
</svg>
