<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 660">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#34d399"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="30" y="40" fill="white" font-size="16" font-weight="700">身份验证优先级「栈」</text>
  <text x="30" y="59" fill="#94a3b8" font-size="10">Claude Code 从顶往下找第一个「有值」的层，选中它</text>

  <!-- 入口：取哪个凭证 -->
  <rect x="232" y="76" width="196" height="38" rx="19" fill="#0f172a"/>
  <rect x="232" y="76" width="196" height="38" rx="19" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="330" y="100" fill="white" font-size="12" font-weight="600" text-anchor="middle">Claude Code 取哪个凭证</text>

  <!-- 顶部入口 → 栈顶 的箭头 -->
  <line x1="330" y1="114" x2="330" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 6 层栈 ============ -->
  <!-- 每层：x=190, width=280, height=54, 行距 70；左侧序号徽标，右侧「有值/空」状态 -->

  <!-- 1 云提供商（最高，空） -->
  <rect x="190" y="140" width="280" height="54" rx="6" fill="#0f172a"/>
  <rect x="190" y="140" width="280" height="54" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.3" stroke-dasharray="5,4"/>
  <circle cx="216" cy="167" r="13" fill="#0f172a" stroke="#64748b" stroke-width="1.3"/>
  <text x="216" y="171" fill="#94a3b8" font-size="12" font-weight="700" text-anchor="middle">1</text>
  <text x="244" y="163" fill="#cbd5e1" font-size="12" font-weight="600">云提供商</text>
  <text x="244" y="180" fill="#64748b" font-size="9">Bedrock / Vertex / Foundry · 最高优先级</text>
  <text x="450" y="172" fill="#64748b" font-size="9" text-anchor="end">— 空 —</text>

  <!-- 2 ANTHROPIC_AUTH_TOKEN（空） -->
  <rect x="190" y="210" width="280" height="54" rx="6" fill="#0f172a"/>
  <rect x="190" y="210" width="280" height="54" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.3" stroke-dasharray="5,4"/>
  <circle cx="216" cy="237" r="13" fill="#0f172a" stroke="#64748b" stroke-width="1.3"/>
  <text x="216" y="241" fill="#94a3b8" font-size="12" font-weight="700" text-anchor="middle">2</text>
  <text x="244" y="233" fill="#cbd5e1" font-size="12" font-weight="600">ANTHROPIC_AUTH_TOKEN</text>
  <text x="244" y="250" fill="#64748b" font-size="9">走 LLM 网关 / 代理（Bearer 头）</text>
  <text x="450" y="242" fill="#64748b" font-size="9" text-anchor="end">— 空 —</text>

  <!-- 3 ANTHROPIC_API_KEY（空） -->
  <rect x="190" y="280" width="280" height="54" rx="6" fill="#0f172a"/>
  <rect x="190" y="280" width="280" height="54" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.3" stroke-dasharray="5,4"/>
  <circle cx="216" cy="307" r="13" fill="#0f172a" stroke="#64748b" stroke-width="1.3"/>
  <text x="216" y="311" fill="#94a3b8" font-size="12" font-weight="700" text-anchor="middle">3</text>
  <text x="244" y="303" fill="#cbd5e1" font-size="12" font-weight="600">ANTHROPIC_API_KEY</text>
  <text x="244" y="320" fill="#64748b" font-size="9">直连 Anthropic API（X-Api-Key 头）</text>
  <text x="450" y="312" fill="#64748b" font-size="9" text-anchor="end">— 空 —</text>

  <!-- 4 apiKeyHelper（空） -->
  <rect x="190" y="350" width="280" height="54" rx="6" fill="#0f172a"/>
  <rect x="190" y="350" width="280" height="54" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.3" stroke-dasharray="5,4"/>
  <circle cx="216" cy="377" r="13" fill="#0f172a" stroke="#64748b" stroke-width="1.3"/>
  <text x="216" y="381" fill="#94a3b8" font-size="12" font-weight="700" text-anchor="middle">4</text>
  <text x="244" y="373" fill="#cbd5e1" font-size="12" font-weight="600">apiKeyHelper 脚本</text>
  <text x="244" y="390" fill="#64748b" font-size="9">动态 / 轮换凭证</text>
  <text x="450" y="382" fill="#64748b" font-size="9" text-anchor="end">— 空 —</text>

  <!-- 5 CLAUDE_CODE_OAUTH_TOKEN（空） -->
  <rect x="190" y="420" width="280" height="54" rx="6" fill="#0f172a"/>
  <rect x="190" y="420" width="280" height="54" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.3" stroke-dasharray="5,4"/>
  <circle cx="216" cy="447" r="13" fill="#0f172a" stroke="#64748b" stroke-width="1.3"/>
  <text x="216" y="451" fill="#94a3b8" font-size="12" font-weight="700" text-anchor="middle">5</text>
  <text x="244" y="443" fill="#cbd5e1" font-size="12" font-weight="600">CLAUDE_CODE_OAUTH_TOKEN</text>
  <text x="244" y="460" fill="#64748b" font-size="9">CI 里用的长期令牌</text>
  <text x="450" y="452" fill="#64748b" font-size="9" text-anchor="end">— 空 —</text>

  <!-- 6 订阅登录（最低，有值 → 选中） -->
  <rect x="190" y="490" width="280" height="58" rx="6" fill="#0f172a"/>
  <rect x="190" y="490" width="280" height="58" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <circle cx="216" cy="519" r="13" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="216" y="523" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">6</text>
  <text x="244" y="514" fill="white" font-size="12" font-weight="600">订阅登录（/login）</text>
  <text x="244" y="531" fill="#94a3b8" font-size="9">个人订阅默认走这层 · 永远在最底</text>
  <text x="450" y="514" fill="#34d399" font-size="11" font-weight="700" text-anchor="end">✓ 有值</text>
  <text x="450" y="531" fill="#34d399" font-size="9" text-anchor="end">命中，选它</text>

  <!-- ===== 左侧：自顶向下扫描的「探针」箭头 ===== -->
  <!-- 从栈顶往下穿过 1~5（空），停在 6（命中） -->
  <line x1="150" y1="138" x2="150" y2="514" stroke="#fbbf24" stroke-width="1.6" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>
  <text x="142" y="330" fill="#fbbf24" font-size="9" text-anchor="end" transform="rotate(-90 142,330)">逐层往下找「有值」的</text>
  <!-- 命中处横向指入第 6 层 -->
  <line x1="150" y1="519" x2="186" y2="519" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>

  <!-- 跳过标记：在 1~5 层左缘画小叉，表示「空，跳过」 -->
  <g stroke="#64748b" stroke-width="1.4">
    <line x1="161" y1="163" x2="169" y2="171"/><line x1="169" y1="163" x2="161" y2="171"/>
    <line x1="161" y1="233" x2="169" y2="241"/><line x1="169" y1="233" x2="161" y2="241"/>
    <line x1="161" y1="303" x2="169" y2="311"/><line x1="169" y1="303" x2="161" y2="311"/>
    <line x1="161" y1="373" x2="169" y2="381"/><line x1="169" y1="373" x2="161" y2="381"/>
    <line x1="161" y1="443" x2="169" y2="451"/><line x1="169" y1="443" x2="161" y2="451"/>
  </g>

  <!-- ===== 右侧：方向标尺 高→低 ===== -->
  <text x="500" y="150" fill="#fb7185" font-size="9" font-weight="600">高</text>
  <line x1="508" y1="158" x2="508" y2="528" stroke="#334155" stroke-width="1.2"/>
  <polygon points="508,536 504,528 512,528" fill="#475569"/>
  <text x="498" y="540" fill="#60a5fa" font-size="9" font-weight="600">低</text>
  <text x="520" y="346" fill="#64748b" font-size="9" transform="rotate(90 520,346)">优先级</text>

  <!-- 底部规则说明 -->
  <rect x="190" y="576" width="280" height="48" rx="6" fill="#0f172a"/>
  <rect x="190" y="576" width="280" height="48" rx="6" fill="rgba(120,53,15,0.28)" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="330" y="596" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">上层有值就盖过下层</text>
  <text x="330" y="613" fill="#cbd5e1" font-size="9" text-anchor="middle">订阅永远在最底——上面任一层有值，它就被盖过</text>
</svg>
