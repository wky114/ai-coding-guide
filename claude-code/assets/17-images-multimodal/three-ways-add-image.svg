<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">三种方式把图喂进去</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">拖、贴、给路径，殊途同归</text>

  <!-- 连线（先画，垫在节点底下）：三个源 → Claude 核心左边缘 (x=486) -->
  <!-- ① 拖拽：从节点右边 (266,128) 汇入核心上半 (486,180) -->
  <path d="M 266,128 C 376,128 376,180 480,180" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- ② 粘贴：从节点右边 (296,215) 直入核心中部 (486,215) -->
  <line x1="296" y1="215" x2="480" y2="215" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <!-- ③ 给路径：从节点右边 (296,302) 汇入核心下半 (486,250) -->
  <path d="M 296,302 C 388,302 388,250 480,250" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- ① 拖拽（青） -->
  <rect x="100" y="100" width="166" height="56" rx="6" fill="#0f172a"/>
  <rect x="100" y="100" width="166" height="56" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="183" y="125" fill="white" font-size="12" font-weight="600" text-anchor="middle">① 拖拽</text>
  <text x="183" y="143" fill="#94a3b8" font-size="9" text-anchor="middle">把图拖进窗口</text>

  <!-- ② ctrl+v 粘贴（绿，重点） -->
  <rect x="100" y="187" width="196" height="60" rx="6" fill="#0f172a"/>
  <rect x="100" y="187" width="196" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="198" y="211" fill="white" font-size="12" font-weight="600" text-anchor="middle">② ctrl+v 粘贴</text>
  <text x="198" y="229" fill="#34d399" font-size="9" text-anchor="middle">Mac 也是 ctrl+v</text>
  <text x="198" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">不是 cmd+v</text>

  <!-- ③ 给路径（紫） -->
  <rect x="100" y="274" width="196" height="56" rx="6" fill="#0f172a"/>
  <rect x="100" y="274" width="196" height="56" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="198" y="299" fill="white" font-size="12" font-weight="600" text-anchor="middle">③ 给路径</text>
  <text x="198" y="317" fill="#94a3b8" font-size="9" text-anchor="middle">分析这张图：~/报错.png</text>

  <!-- Claude 核心节点（右，青，强调） -->
  <rect x="486" y="168" width="190" height="94" rx="8" fill="#0f172a"/>
  <rect x="486" y="168" width="190" height="94" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="2.5"/>
  <text x="581" y="206" fill="white" font-size="15" font-weight="700" text-anchor="middle">Claude</text>
  <text x="581" y="228" fill="#94a3b8" font-size="10" text-anchor="middle">看图 · 理解 · 干活</text>
  <text x="581" y="246" fill="#22d3ee" font-size="9" text-anchor="middle">三条路殊途同归</text>

  <!-- 核心旁注 -->
  <text x="581" y="296" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">文字说不清时</text>
  <text x="581" y="312" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">给它看图最快</text>
</svg>
