<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="26" y="34" fill="white" font-size="16" font-weight="700">三个打开 Claude 面板的入口</text>
  <text x="26" y="53" fill="#94a3b8" font-size="10">右上角 Spark 图标必须开着文件才出现；活动栏、状态栏两个入口随时能点</text>

  <!-- VS Code 窗口外框 -->
  <rect x="26" y="70" width="628" height="372" rx="8" fill="#0f172a"/>
  <rect x="26" y="70" width="628" height="372" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 标题栏 -->
  <line x1="26" y1="96" x2="654" y2="96" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="44" cy="83" r="4" fill="#fb7185"/>
  <circle cx="58" cy="83" r="4" fill="#fbbf24"/>
  <circle cx="72" cy="83" r="4" fill="#34d399"/>

  <!-- 活动栏（最左竖排） -->
  <rect x="26" y="96" width="40" height="320" fill="rgba(15,23,42,0.9)"/>
  <line x1="66" y1="96" x2="66" y2="416" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="46" y="124" fill="#64748b" font-size="13" text-anchor="middle">⧉</text>
  <text x="46" y="156" fill="#64748b" font-size="13" text-anchor="middle">⌕</text>
  <!-- 活动栏 Spark（入口①，高亮） -->
  <rect x="32" y="176" width="28" height="28" rx="5" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="46" y="195" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">✱</text>
  <text x="46" y="224" fill="#64748b" font-size="13" text-anchor="middle">⎇</text>

  <!-- 资源管理器 -->
  <text x="80" y="118" fill="#94a3b8" font-size="9" font-weight="600">EXPLORER</text>
  <text x="80" y="140" fill="#cbd5e1" font-size="9">▸ vscode-claude-demo</text>
  <text x="92" y="158" fill="#22d3ee" font-size="9">demo.py</text>
  <line x1="190" y1="96" x2="190" y2="416" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.4"/>

  <!-- 编辑器标签页 -->
  <rect x="190" y="96" width="100" height="24" fill="rgba(8,51,68,0.4)"/>
  <text x="240" y="112" fill="white" font-size="9" text-anchor="middle">demo.py</text>
  <line x1="190" y1="120" x2="640" y2="120" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.4"/>

  <!-- 编辑器右上角工具栏 Spark（入口②，主高亮） -->
  <rect x="592" y="98" width="40" height="20" rx="4" fill="#0f172a"/>
  <rect x="592" y="98" width="40" height="20" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <text x="612" y="113" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">✱</text>

  <!-- 编辑器代码区 -->
  <text x="206" y="146" fill="#64748b" font-size="9">1</text>
  <text x="224" y="146" fill="#a78bfa" font-size="9">def</text>
  <text x="252" y="146" fill="#22d3ee" font-size="9">greet</text>
  <text x="288" y="146" fill="#cbd5e1" font-size="9">(name):</text>
  <text x="206" y="164" fill="#64748b" font-size="9">2</text>
  <text x="240" y="164" fill="#a78bfa" font-size="9">return</text>
  <text x="292" y="164" fill="#34d399" font-size="9">"Hello " + name</text>

  <!-- 状态栏（底部） -->
  <line x1="26" y1="416" x2="654" y2="416" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="26" y="416" width="628" height="26" fill="rgba(15,23,42,0.9)"/>
  <text x="46" y="433" fill="#64748b" font-size="9">main ✓</text>
  <text x="120" y="433" fill="#64748b" font-size="9">Python 3.12</text>
  <!-- 状态栏 Claude Code（入口③，高亮） -->
  <rect x="520" y="420" width="120" height="18" rx="3" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="580" y="433" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">✱ Claude Code</text>

  <!-- 标注① 活动栏 -->
  <circle cx="46" cy="190" r="16" fill="none" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- 标注② 编辑器右上角 Spark（主入口） -->
  <text x="470" y="158" fill="#fbbf24" font-size="11" font-weight="700">② 编辑器右上角 Spark</text>
  <text x="470" y="174" fill="#94a3b8" font-size="8.5">最快，但只在开了文件时才出现</text>
  <path d="M 590 152 Q 620 135 612 122" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>

  <!-- 标注① 文案 -->
  <text x="90" y="262" fill="#fbbf24" font-size="11" font-weight="700">① 活动栏 Spark</text>
  <text x="90" y="278" fill="#94a3b8" font-size="8.5">一直都在，点开是会话列表</text>
  <path d="M 88 262 Q 66 240 56 210" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>

  <!-- 标注③ 状态栏 -->
  <text x="380" y="392" fill="#fbbf24" font-size="11" font-weight="700">③ 状态栏 ✱ Claude Code</text>
  <text x="380" y="408" fill="#94a3b8" font-size="8.5">没开文件也能点，最省心</text>
  <path d="M 560 396 Q 575 410 578 418" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>
</svg>
