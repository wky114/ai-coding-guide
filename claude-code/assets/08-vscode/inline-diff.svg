<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="26" y="34" fill="white" font-size="16" font-weight="700">内联 diff：左原始，右建议改动</text>
  <text x="26" y="53" fill="#94a3b8" font-size="10">红绿高亮逐处摆出来，看清了再点「接受 / 拒绝」</text>

  <!-- VS Code 窗口外框 -->
  <rect x="26" y="70" width="648" height="356" rx="8" fill="#0f172a"/>
  <rect x="26" y="70" width="648" height="356" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 标题栏 -->
  <line x1="26" y1="96" x2="674" y2="96" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="44" cy="83" r="4" fill="#fb7185"/>
  <circle cx="58" cy="83" r="4" fill="#fbbf24"/>
  <circle cx="72" cy="83" r="4" fill="#34d399"/>
  <text x="350" y="87" fill="#94a3b8" font-size="9" text-anchor="middle">demo.py   原始  vs  Claude 建议</text>

  <!-- 两栏表头 -->
  <rect x="40" y="106" width="306" height="22" fill="rgba(136,19,55,0.25)"/>
  <text x="54" y="121" fill="#fb7185" font-size="9.5" font-weight="600">原始（Original）</text>
  <rect x="354" y="106" width="306" height="22" fill="rgba(6,78,59,0.25)"/>
  <text x="368" y="121" fill="#34d399" font-size="9.5" font-weight="600">Claude 建议改动（Suggested）</text>
  <line x1="350" y1="106" x2="350" y2="356" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ===== 左栏：原始代码 ===== -->
  <!-- 行1（不变） -->
  <text x="50" y="156" fill="#64748b" font-size="9">1</text>
  <text x="70" y="156" fill="#a78bfa" font-size="10">def</text>
  <text x="100" y="156" fill="#22d3ee" font-size="10">greet</text>
  <text x="138" y="156" fill="#cbd5e1" font-size="10">(name):</text>
  <!-- 行2（被改，红底） -->
  <rect x="40" y="164" width="306" height="20" fill="rgba(136,19,55,0.35)"/>
  <text x="50" y="178" fill="#64748b" font-size="9">2</text>
  <text x="58" y="178" fill="#fb7185" font-size="10">-</text>
  <text x="78" y="178" fill="#a78bfa" font-size="10">return</text>
  <text x="130" y="178" fill="#cbd5e1" font-size="10">"Hello " + name</text>
  <!-- 行3（不变） -->
  <text x="50" y="202" fill="#64748b" font-size="9">3</text>
  <!-- 行4（不变） -->
  <text x="50" y="222" fill="#64748b" font-size="9">4</text>
  <text x="70" y="222" fill="#a78bfa" font-size="10">print</text>
  <text x="106" y="222" fill="#cbd5e1" font-size="10">(greet("world"))</text>

  <!-- ===== 右栏：建议改动 ===== -->
  <!-- 行1（改，绿底）签名加类型注解 -->
  <rect x="354" y="140" width="306" height="20" fill="rgba(6,78,59,0.35)"/>
  <text x="364" y="156" fill="#64748b" font-size="9">1</text>
  <text x="372" y="156" fill="#34d399" font-size="10">+</text>
  <text x="392" y="156" fill="#a78bfa" font-size="10">def</text>
  <text x="422" y="156" fill="#22d3ee" font-size="10">greet</text>
  <text x="460" y="156" fill="#cbd5e1" font-size="10">(name: str) -> str:</text>
  <!-- 行2（改，绿底）f-string -->
  <rect x="354" y="164" width="306" height="20" fill="rgba(6,78,59,0.35)"/>
  <text x="364" y="178" fill="#64748b" font-size="9">2</text>
  <text x="372" y="178" fill="#34d399" font-size="10">+</text>
  <text x="392" y="178" fill="#a78bfa" font-size="10">return</text>
  <text x="444" y="178" fill="#fbbf24" font-size="10">f</text>
  <text x="452" y="178" fill="#34d399" font-size="10">"Hello {name}"</text>
  <!-- 行3（不变） -->
  <text x="364" y="202" fill="#64748b" font-size="9">3</text>
  <!-- 行4（不变） -->
  <text x="364" y="222" fill="#64748b" font-size="9">4</text>
  <text x="392" y="222" fill="#a78bfa" font-size="10">print</text>
  <text x="428" y="222" fill="#cbd5e1" font-size="10">(greet("world"))</text>

  <!-- 「当场可改」旁注 -->
  <text x="368" y="246" fill="#60a5fa" font-size="8.5">↑ 接受前可在这里直接手动改它的建议</text>

  <!-- ===== 底部权限提示条 ===== -->
  <rect x="40" y="330" width="620" height="72" rx="6" fill="#0f172a"/>
  <rect x="40" y="330" width="620" height="72" rx="6" fill="rgba(59,130,246,0.18)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="56" y="354" fill="white" font-size="11" font-weight="600">Claude 想修改 demo.py，应用这些改动吗？</text>

  <!-- 接受 -->
  <rect x="56" y="366" width="120" height="26" rx="5" fill="#0f172a"/>
  <rect x="56" y="366" width="120" height="26" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="116" y="383" fill="white" font-size="10.5" font-weight="600" text-anchor="middle">✓ 接受</text>
  <!-- 拒绝 -->
  <rect x="188" y="366" width="120" height="26" rx="5" fill="#0f172a"/>
  <rect x="188" y="366" width="120" height="26" rx="5" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="248" y="383" fill="white" font-size="10.5" font-weight="600" text-anchor="middle">✗ 拒绝</text>
  <!-- 告诉它改成别的 -->
  <rect x="320" y="366" width="200" height="26" rx="5" fill="#0f172a"/>
  <rect x="320" y="366" width="200" height="26" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="420" y="383" fill="#cbd5e1" font-size="10" text-anchor="middle">或告诉它改成别的样子…</text>
</svg>
