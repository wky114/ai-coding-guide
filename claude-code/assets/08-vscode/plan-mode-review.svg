<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 470">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="26" y="34" fill="white" font-size="16" font-weight="700">Plan Mode：方案先开成文档，逐条批注</text>
  <text x="26" y="53" fill="#94a3b8" font-size="10">计划以 Markdown 打开，在某一步旁写内联批注，它开工前就吸收进去</text>

  <!-- VS Code 窗口外框 -->
  <rect x="26" y="70" width="648" height="376" rx="8" fill="#0f172a"/>
  <rect x="26" y="70" width="648" height="376" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 标题栏 -->
  <line x1="26" y1="96" x2="674" y2="96" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="44" cy="83" r="4" fill="#fb7185"/>
  <circle cx="58" cy="83" r="4" fill="#fbbf24"/>
  <circle cx="72" cy="83" r="4" fill="#34d399"/>
  <!-- 模式指示器：Plan Mode -->
  <rect x="510" y="76" width="150" height="16" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="585" y="88" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">模式：Plan Mode</text>

  <!-- 标签页 -->
  <rect x="40" y="96" width="150" height="24" fill="rgba(76,29,149,0.25)"/>
  <text x="115" y="112" fill="white" font-size="9" text-anchor="middle">PLAN.md</text>
  <line x1="40" y1="120" x2="660" y2="120" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.4"/>

  <!-- ===== Markdown 计划文档内容 ===== -->
  <text x="54" y="146" fill="#64748b" font-size="9">1</text>
  <text x="78" y="146" fill="#a78bfa" font-size="12" font-weight="700"># 给 demo.py 加命令行参数支持</text>

  <text x="54" y="172" fill="#64748b" font-size="9">3</text>
  <text x="78" y="172" fill="#22d3ee" font-size="10" font-weight="600">## 计划步骤</text>

  <!-- 步骤1 -->
  <text x="54" y="196" fill="#64748b" font-size="9">5</text>
  <text x="78" y="196" fill="#cbd5e1" font-size="10">1. 引入 argparse，定义 --name 参数</text>

  <!-- 步骤2（被批注的那行，violet 高亮底） -->
  <rect x="40" y="206" width="430" height="22" fill="rgba(76,29,149,0.3)"/>
  <text x="54" y="222" fill="#64748b" font-size="9">6</text>
  <text x="78" y="222" fill="#cbd5e1" font-size="10">2. 把结果写进数据库做缓存</text>

  <!-- 步骤3 -->
  <text x="54" y="248" fill="#64748b" font-size="9">7</text>
  <text x="78" y="248" fill="#cbd5e1" font-size="10">3. 用 args.name 调用 greet() 并打印</text>

  <!-- 步骤4 -->
  <text x="54" y="272" fill="#64748b" font-size="9">8</text>
  <text x="78" y="272" fill="#cbd5e1" font-size="10">4. 补一个 --help 的用法示例</text>

  <!-- 右侧分隔线 + 批注气泡 -->
  <line x1="478" y1="120" x2="478" y2="358" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.4"/>

  <!-- 内联批注气泡（指向步骤2） -->
  <rect x="492" y="186" width="166" height="76" rx="8" fill="#0f172a"/>
  <rect x="492" y="186" width="166" height="76" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="504" y="204" fill="#fbbf24" font-size="9" font-weight="600">你的批注 · 第 2 步</text>
  <line x1="504" y1="210" x2="646" y2="210" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="504" y="226" fill="white" font-size="9.5">这里别动数据库，</text>
  <text x="504" y="242" fill="white" font-size="9.5">先加内存缓存就行</text>
  <text x="504" y="256" fill="#94a3b8" font-size="8">— 它开工前会吸收</text>
  <!-- 气泡指向步骤2 的连线 -->
  <path d="M 492 222 Q 478 220 472 218" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- ===== 底部审批条 ===== -->
  <rect x="40" y="372" width="620" height="62" rx="6" fill="#0f172a"/>
  <rect x="40" y="372" width="620" height="62" rx="6" fill="rgba(76,29,149,0.18)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="56" y="396" fill="white" font-size="11" font-weight="600">Claude 已交方案，等你批准才动手</text>

  <rect x="56" y="406" width="150" height="22" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="131" y="421" fill="white" font-size="10" font-weight="600" text-anchor="middle">✓ 批准并执行</text>

  <rect x="218" y="406" width="190" height="22" rx="5" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="313" y="421" fill="white" font-size="10" text-anchor="middle">带着批注让它改方案</text>

  <rect x="420" y="406" width="120" height="22" rx="5" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="480" y="421" fill="white" font-size="10" text-anchor="middle">✗ 拒绝</text>
</svg>
