<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 470">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="26" y="34" fill="white" font-size="16" font-weight="700">在扩展市场搜 Claude Code</text>
  <text x="26" y="53" fill="#94a3b8" font-size="10">Cmd+Shift+X 打开扩展视图，认准发布者是 Anthropic 的那个</text>

  <!-- VS Code 窗口外框 -->
  <rect x="26" y="70" width="608" height="372" rx="8" fill="#0f172a"/>
  <rect x="26" y="70" width="608" height="372" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- 标题栏 -->
  <line x1="26" y1="96" x2="634" y2="96" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="44" cy="83" r="4" fill="#fb7185"/>
  <circle cx="58" cy="83" r="4" fill="#fbbf24"/>
  <circle cx="72" cy="83" r="4" fill="#34d399"/>
  <text x="330" y="87" fill="#94a3b8" font-size="9" text-anchor="middle">VS Code — Extensions</text>

  <!-- 搜索框 -->
  <rect x="44" y="110" width="572" height="30" rx="5" fill="#0f172a"/>
  <rect x="44" y="110" width="572" height="30" rx="5" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="58" y="129" fill="white" font-size="11" font-weight="600">Claude Code</text>
  <text x="600" y="129" fill="#64748b" font-size="11" text-anchor="end">⌕</text>

  <!-- 结果 1：官方（高亮） -->
  <rect x="44" y="156" width="572" height="64" rx="6" fill="#0f172a"/>
  <rect x="44" y="156" width="572" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <rect x="58" y="170" width="36" height="36" rx="6" fill="#0f172a"/>
  <rect x="58" y="170" width="36" height="36" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="76" y="193" fill="#22d3ee" font-size="16" font-weight="700" text-anchor="middle">✱</text>
  <text x="106" y="180" fill="white" font-size="12" font-weight="600">Claude Code</text>
  <text x="106" y="198" fill="#34d399" font-size="9.5">发布者：Anthropic</text>
  <text x="106" y="212" fill="#94a3b8" font-size="8.5">Agentic coding tool — 官方扩展</text>
  <!-- Install 按钮 -->
  <rect x="500" y="174" width="100" height="28" rx="5" fill="#0f172a"/>
  <rect x="500" y="174" width="100" height="28" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="192" fill="white" font-size="11" font-weight="600" text-anchor="middle">Install</text>

  <!-- 结果 2：仿冒（灰） -->
  <rect x="44" y="232" width="572" height="56" rx="6" fill="#0f172a"/>
  <rect x="44" y="232" width="572" height="56" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.5"/>
  <rect x="58" y="244" width="32" height="32" rx="6" fill="rgba(30,41,59,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="106" y="256" fill="#cbd5e1" font-size="11" font-weight="600">Claude Code Helper</text>
  <text x="106" y="272" fill="#fb7185" font-size="9">发布者：third-party · 非官方</text>
  <rect x="500" y="248" width="100" height="24" rx="5" fill="rgba(30,41,59,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="550" y="264" fill="#94a3b8" font-size="10" text-anchor="middle">Install</text>

  <!-- 结果 3：仿冒（灰） -->
  <rect x="44" y="300" width="572" height="44" rx="6" fill="#0f172a"/>
  <rect x="44" y="300" width="572" height="44" rx="6" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.5"/>
  <rect x="58" y="310" width="24" height="24" rx="5" fill="rgba(30,41,59,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="98" y="319" fill="#cbd5e1" font-size="10" font-weight="600">claude-code-pro</text>
  <text x="98" y="333" fill="#fb7185" font-size="8.5">发布者：unknown · 仿冒，别装</text>

  <!-- 标注：选这个 -->
  <text x="120" y="380" fill="#34d399" font-size="10" font-weight="600">✓ 选发布者 = Anthropic 的</text>
  <path d="M 200 372 Q 320 360 470 200" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-emerald)"/>

  <!-- 标注：别选灰的 -->
  <text x="360" y="400" fill="#fb7185" font-size="10" font-weight="600">✗ 名字相似的仿冒，跳过</text>
  <path d="M 440 392 Q 480 360 500 290" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-rose)"/>
</svg>
