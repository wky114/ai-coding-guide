<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="16" font-weight="700">JetBrains 设置面板：装插件 + 调插件（示意）</text>
  <text x="30" y="60" fill="#94a3b8" font-size="10">同一个 Settings 窗口的两处节点 —— 左树定位，右侧操作</text>

  <!-- ===== 设置窗口外框 ===== -->
  <rect x="30" y="80" width="840" height="500" rx="10" fill="#0f172a"/>
  <rect x="30" y="80" width="840" height="500" rx="10" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 窗口标题栏 -->
  <rect x="30" y="80" width="840" height="34" rx="10" fill="rgba(30,41,59,0.8)"/>
  <rect x="30" y="104" width="840" height="10" fill="rgba(30,41,59,0.8)"/>
  <circle cx="50" cy="97" r="5" fill="#fb7185"/>
  <circle cx="68" cy="97" r="5" fill="#fbbf24"/>
  <circle cx="86" cy="97" r="5" fill="#34d399"/>
  <text x="450" y="101" fill="#cbd5e1" font-size="11" font-weight="600" text-anchor="middle">Settings / 设置</text>

  <!-- ===== 左侧设置树 ===== -->
  <rect x="46" y="128" width="232" height="436" rx="6" fill="rgba(15,23,42,0.6)" stroke="#334155" stroke-width="1"/>
  <!-- 搜索框 -->
  <rect x="58" y="140" width="208" height="26" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <circle cx="71" cy="152" r="4" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <line x1="74" y1="155" x2="77" y2="158" stroke="#64748b" stroke-width="1.2"/>
  <text x="84" y="156" fill="#64748b" font-size="9">搜索设置…</text>

  <!-- 树节点 -->
  <text x="66" y="194" fill="#94a3b8" font-size="10">Appearance &amp; Behavior</text>
  <text x="66" y="218" fill="#94a3b8" font-size="10">Keymap</text>
  <text x="66" y="242" fill="#94a3b8" font-size="10">Editor</text>

  <!-- 高亮节点①：Plugins -->
  <rect x="56" y="252" width="212" height="26" rx="4" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="66" y="269" fill="white" font-size="10" font-weight="600">① Plugins（插件）</text>

  <text x="66" y="302" fill="#94a3b8" font-size="10">Version Control</text>
  <text x="66" y="326" fill="#94a3b8" font-size="10">Build, Execution</text>

  <!-- Tools 父节点 + 高亮子节点②：Claude Code -->
  <text x="66" y="350" fill="#cbd5e1" font-size="10">Tools（工具）</text>
  <rect x="56" y="360" width="212" height="26" rx="4" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="82" y="377" fill="white" font-size="10" font-weight="600">② Claude Code [Beta]</text>

  <text x="82" y="410" fill="#94a3b8" font-size="10">Terminal</text>
  <text x="66" y="434" fill="#94a3b8" font-size="10">Languages &amp; Frameworks</text>

  <!-- 连线：左树 ① → 右上区 -->
  <line x1="268" y1="265" x2="316" y2="180" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-emerald)"/>
  <!-- 连线：左树 ② → 右下区 -->
  <line x1="268" y1="373" x2="316" y2="430" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-violet)"/>

  <!-- ===== 右上区①：Plugins → Marketplace 装插件 ===== -->
  <rect x="318" y="128" width="536" height="180" rx="6" fill="#0f172a"/>
  <rect x="318" y="128" width="536" height="180" rx="6" fill="rgba(6,78,59,0.25)" stroke="#34d399" stroke-width="1.5"/>
  <text x="334" y="150" fill="#34d399" font-size="11" font-weight="700">① 装插件：Plugins → Marketplace</text>

  <!-- Marketplace / Installed 标签 -->
  <rect x="334" y="160" width="100" height="22" rx="4" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="384" y="175" fill="white" font-size="9" text-anchor="middle">Marketplace</text>
  <text x="452" y="175" fill="#64748b" font-size="9">Installed</text>

  <!-- 搜索框：Claude Code -->
  <rect x="334" y="190" width="380" height="24" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <circle cx="347" cy="202" r="4" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="350" y1="205" x2="353" y2="208" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="360" y="206" fill="#e2e8f0" font-size="9">Claude Code</text>

  <!-- 第一条结果（高亮） + Install 按钮 -->
  <rect x="334" y="222" width="506" height="36" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="346" y="238" fill="white" font-size="10" font-weight="600">Claude Code [Beta]</text>
  <text x="346" y="251" fill="#94a3b8" font-size="8">Anthropic · 官方插件（认准这个）</text>
  <rect x="748" y="230" width="78" height="22" rx="4" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="787" y="245" fill="white" font-size="9" font-weight="600" text-anchor="middle">Install</text>

  <polygon points="338,270 342,278 334,278" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="338" y="277" fill="#fbbf24" font-size="8" font-weight="700" text-anchor="middle">!</text>
  <text x="350" y="278" fill="#fbbf24" font-size="9">装完务必「完全重启 IDE」才生效</text>
  <text x="334" y="296" fill="#94a3b8" font-size="9">名字带 [Beta] 后缀 = 还在测试阶段，以官方文档为准</text>

  <!-- ===== 右下区②：Tools → Claude Code 调插件 ===== -->
  <rect x="318" y="320" width="536" height="244" rx="6" fill="#0f172a"/>
  <rect x="318" y="320" width="536" height="244" rx="6" fill="rgba(76,29,149,0.22)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="334" y="342" fill="#a78bfa" font-size="11" font-weight="700">② 调插件：Tools → Claude Code [Beta]</text>

  <!-- 配置项 1：Claude command（关键，高亮） -->
  <rect x="334" y="354" width="506" height="46" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.4"/>
  <text x="346" y="372" fill="white" font-size="10" font-weight="600">Claude command（命令路径）</text>
  <text x="346" y="390" fill="#94a3b8" font-size="8.5">默认 claude；不在 PATH 就填绝对路径。「command not found」八成查这里</text>
  <rect x="648" y="364" width="180" height="22" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="658" y="379" fill="#e2e8f0" font-size="8.5">/usr/local/bin/claude</text>

  <!-- 配置项 2：Option+Enter 多行输入 -->
  <rect x="334" y="410" width="506" height="42" rx="4" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="1"/>
  <rect x="346" y="424" width="16" height="16" rx="3" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="350" y="436" fill="white" font-size="10">✓</text>
  <text x="372" y="430" fill="white" font-size="10" font-weight="600">启用 Option+Enter 多行输入（仅 macOS）</text>
  <text x="372" y="445" fill="#94a3b8" font-size="8.5">打字时 Option 键被抢就关掉它，改完需重启终端</text>

  <!-- 配置项 3：自动更新 -->
  <rect x="334" y="462" width="506" height="42" rx="4" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="1"/>
  <rect x="346" y="476" width="16" height="16" rx="3" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="350" y="488" fill="white" font-size="10">✓</text>
  <text x="372" y="482" fill="white" font-size="10" font-weight="600">启用自动更新</text>
  <text x="372" y="497" fill="#94a3b8" font-size="8.5">自动检查并安装插件更新，重启时应用</text>

  <!-- WSL 提示 -->
  <circle cx="338" cy="525" r="4.5" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="338" y="528" fill="#fbbf24" font-size="8" font-weight="700" text-anchor="middle">i</text>
  <text x="350" y="528" fill="#fbbf24" font-size="9">WSL 用户：command 填  wsl -d Ubuntu -- bash -lic "claude"</text>
  <text x="334" y="548" fill="#64748b" font-size="8">（界面为示意图，按钮位置与版本可能略有差异，以实际 IDE 为准）</text>
</svg>
