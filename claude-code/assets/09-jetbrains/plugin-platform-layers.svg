<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 470">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="16" font-weight="700">一个插件，通吃所有 JetBrains IDE</text>
  <text x="30" y="60" fill="#94a3b8" font-size="10">上层 IDE 各不相同，但都构建在同一个 IntelliJ 平台底座上</text>

  <!-- 顶层：同一个 Claude Code 插件（向 6 个 IDE 扇出连线，先画线）-->
  <line x1="180" y1="138" x2="120" y2="196" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow-cyan)"/>
  <line x1="300" y1="138" x2="270" y2="196" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow-cyan)"/>
  <line x1="400" y1="138" x2="420" y2="196" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow-cyan)"/>
  <line x1="500" y1="138" x2="570" y2="196" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow-cyan)"/>
  <line x1="600" y1="138" x2="720" y2="196" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow-cyan)"/>

  <rect x="245" y="78" width="290" height="58" rx="8" fill="#0f172a"/>
  <rect x="245" y="78" width="290" height="58" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="390" y="104" fill="white" font-size="13" font-weight="600" text-anchor="middle">Claude Code 插件（同一个）</text>
  <text x="390" y="123" fill="#94a3b8" font-size="9" text-anchor="middle">接通 IDE 与 CLI，安装配置步骤处处一致</text>

  <!-- 中层：6 个 IDE，emerald -->
  <!-- IntelliJ IDEA -->
  <rect x="62" y="198" width="116" height="64" rx="6" fill="#0f172a"/>
  <rect x="62" y="198" width="116" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="120" y="224" fill="white" font-size="11" font-weight="600" text-anchor="middle">IntelliJ IDEA</text>
  <text x="120" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">Java / Kotlin</text>

  <!-- PyCharm -->
  <rect x="194" y="198" width="116" height="64" rx="6" fill="#0f172a"/>
  <rect x="194" y="198" width="116" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="252" y="224" fill="white" font-size="11" font-weight="600" text-anchor="middle">PyCharm</text>
  <text x="252" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">Python</text>

  <!-- WebStorm -->
  <rect x="326" y="198" width="116" height="64" rx="6" fill="#0f172a"/>
  <rect x="326" y="198" width="116" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="384" y="224" fill="white" font-size="11" font-weight="600" text-anchor="middle">WebStorm</text>
  <text x="384" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">前端 JS / TS</text>

  <!-- PhpStorm -->
  <rect x="458" y="198" width="116" height="64" rx="6" fill="#0f172a"/>
  <rect x="458" y="198" width="116" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="516" y="224" fill="white" font-size="11" font-weight="600" text-anchor="middle">PhpStorm</text>
  <text x="516" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">PHP</text>

  <!-- GoLand -->
  <rect x="590" y="198" width="116" height="64" rx="6" fill="#0f172a"/>
  <rect x="590" y="198" width="116" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="648" y="224" fill="white" font-size="11" font-weight="600" text-anchor="middle">GoLand</text>
  <text x="648" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">Go</text>

  <!-- Android Studio -->
  <rect x="722" y="198" width="116" height="64" rx="6" fill="#0f172a"/>
  <rect x="722" y="198" width="116" height="64" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="780" y="224" fill="white" font-size="11" font-weight="600" text-anchor="middle">Android Studio</text>
  <text x="780" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">安卓开发</text>

  <!-- 连线：每个 IDE 落到底座（短竖线）-->
  <line x1="120" y1="262" x2="120" y2="338" stroke="#64748b" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="252" y1="262" x2="252" y2="338" stroke="#64748b" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="384" y1="262" x2="384" y2="338" stroke="#64748b" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="516" y1="262" x2="516" y2="338" stroke="#64748b" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="648" y1="262" x2="648" y2="338" stroke="#64748b" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="780" y1="262" x2="780" y2="338" stroke="#64748b" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- 底座：IntelliJ Platform，宽 amber 条 -->
  <rect x="62" y="338" width="776" height="68" rx="8" fill="#0f172a"/>
  <rect x="62" y="338" width="776" height="68" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="368" fill="white" font-size="13" font-weight="600" text-anchor="middle">IntelliJ Platform 公共底座</text>
  <text x="450" y="388" fill="#fbbf24" font-size="9" text-anchor="middle">编辑器内核 · 终端 · 插件系统 · 设置面板 —— 所有 IDE 共享</text>

  <!-- 旁注 -->
  <text x="744" y="128" fill="#22d3ee" font-size="9">↑ 装一次，处处能用</text>
</svg>
