<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">第一次跑通 Claude Code</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">启动 → 登录 → 看命令 → 下指令 → 看 diff 点头 → 写文件</text>

  <!-- ===== Arrows / lines (draw first, under boxes) ===== -->
  <!-- start -> login -->
  <line x1="290" y1="118" x2="290" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- login -> help -->
  <line x1="290" y1="212" x2="290" y2="242" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- help -> instruct -->
  <line x1="290" y1="306" x2="290" y2="336" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- instruct -> diff decision -->
  <line x1="290" y1="400" x2="290" y2="430" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- decision (yes) -> write file -->
  <line x1="290" y1="538" x2="290" y2="582" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="566" fill="#34d399" font-size="9">是 / yes</text>
  <!-- decision (no) -> cancel (left branch), then loop back up to instruct -->
  <path d="M 214,484 H 96 V 369 H 196" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-rose)"/>
  <text x="150" y="478" fill="#fb7185" font-size="9">否 / no</text>
  <text x="84" y="438" fill="#fb7185" font-size="9" transform="rotate(-90 84,438)">不写文件，重说一遍</text>

  <!-- ===== Boxes (mask + visual) ===== -->

  <!-- 1. Start: 启动 claude -->
  <rect x="200" y="74" width="180" height="44" rx="22" fill="#0f172a"/>
  <rect x="200" y="74" width="180" height="44" rx="22" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="290" y="95" fill="white" font-size="12" font-weight="600" text-anchor="middle">启动 claude</text>
  <text x="290" y="110" fill="#cbd5e1" font-size="8.5" text-anchor="middle">mkdir 空目录 → 输入 claude</text>

  <!-- 2. 引导登录 -->
  <rect x="200" y="150" width="180" height="62" rx="6" fill="#0f172a"/>
  <rect x="200" y="150" width="180" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="290" y="177" fill="white" font-size="12" font-weight="600" text-anchor="middle">引导登录</text>
  <text x="290" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">弹浏览器授权 / 远程按 c 复制 URL</text>

  <!-- 3. /help 看命令 -->
  <rect x="200" y="244" width="180" height="62" rx="6" fill="#0f172a"/>
  <rect x="200" y="244" width="180" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="290" y="271" fill="white" font-size="12" font-weight="600" text-anchor="middle">/help 看命令</text>
  <text x="290" y="289" fill="#94a3b8" font-size="9" text-anchor="middle">弹出可用命令与功能说明</text>

  <!-- 4. 自然语言下指令 -->
  <rect x="200" y="338" width="180" height="62" rx="6" fill="#0f172a"/>
  <rect x="200" y="338" width="180" height="62" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="290" y="365" fill="white" font-size="12" font-weight="600" text-anchor="middle">自然语言下指令</text>
  <text x="290" y="383" fill="#94a3b8" font-size="9" text-anchor="middle">大白话：写个 hello world 函数</text>

  <!-- 5. Decision: 展示 diff，等你确认 -->
  <polygon points="290,430 366,484 290,538 214,484" fill="#0f172a"/>
  <polygon points="290,430 366,484 290,538 214,484" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="290" y="480" fill="white" font-size="11" font-weight="600" text-anchor="middle">展示 diff</text>
  <text x="290" y="496" fill="#fbbf24" font-size="9" text-anchor="middle">你确认?</text>

  <!-- 6. End: 写入文件 -->
  <rect x="200" y="582" width="180" height="44" rx="22" fill="#0f172a"/>
  <rect x="200" y="582" width="180" height="44" rx="22" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="290" y="603" fill="white" font-size="12" font-weight="600" text-anchor="middle">写入文件 ✓</text>
  <text x="290" y="618" fill="#cbd5e1" font-size="8.5" text-anchor="middle">test.py 落盘，exit 退出</text>

  <!-- Side annotation: 核心节奏 -->
  <text x="400" y="478" fill="#fbbf24" font-size="9">先给方案</text>
  <text x="400" y="492" fill="#fbbf24" font-size="9">等你点头</text>
  <text x="400" y="506" fill="#fbbf24" font-size="9">再动手</text>
  <line x1="370" y1="486" x2="396" y2="484" stroke="#fbbf24" stroke-width="1"/>

  <!-- Legend (bottom, outside flow) -->
  <text x="26" y="668" fill="#64748b" font-size="8.5">圆角端点 = 开始/结束　矩形 = 操作步骤　菱形 = 你来拍板</text>
  <text x="26" y="684" fill="#fb7185" font-size="8.5">红色虚线 = 不满意不写文件，调整后再来一轮（它绝不偷偷改你东西）</text>
</svg>
