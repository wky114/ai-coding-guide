<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#34d399"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#22d3ee"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">工作台满了怎么办</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">/compact 压成要点，/clear 整个扫空</text>

  <!-- ===================== 中间：上下文窗口 = 工作台 ===================== -->
  <!-- 容器底（不透明垫层） -->
  <rect x="180" y="84" width="400" height="214" rx="8" fill="#0f172a"/>
  <!-- 容器（琥珀边，表示快满了的警示态） -->
  <rect x="180" y="84" width="400" height="214" rx="8" fill="rgba(120,53,15,0.18)" stroke="#fbbf24" stroke-width="1.6"/>

  <!-- 容器顶部琥珀警示横幅 -->
  <rect x="192" y="96" width="376" height="30" rx="5" fill="#0f172a"/>
  <rect x="192" y="96" width="376" height="30" rx="5" fill="rgba(120,53,15,0.45)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="380" y="115" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">快满了 · 开始变慢、丢早期记忆</text>

  <!-- 标签：上下文窗口 = 工作台 -->
  <text x="380" y="146" fill="#cbd5e1" font-size="11" font-weight="600" text-anchor="middle">上下文窗口 = 你的工作台</text>

  <!-- 台面上塞满的小方块（代表文件 / 对话），近乎堆满 -->
  <!-- 第一排 -->
  <g>
    <rect x="200" y="158" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="200" y="158" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="229" y="175" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 A</text>

    <rect x="268" y="158" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="268" y="158" width="58" height="26" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="297" y="175" fill="#c4b5fd" font-size="8" text-anchor="middle">对话 1</text>

    <rect x="336" y="158" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="336" y="158" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="365" y="175" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 B</text>

    <rect x="404" y="158" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="404" y="158" width="58" height="26" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="433" y="175" fill="#c4b5fd" font-size="8" text-anchor="middle">对话 2</text>

    <rect x="472" y="158" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="472" y="158" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="501" y="175" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 C</text>
  </g>
  <!-- 第二排 -->
  <g>
    <rect x="200" y="192" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="200" y="192" width="58" height="26" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="229" y="209" fill="#c4b5fd" font-size="8" text-anchor="middle">对话 3</text>

    <rect x="268" y="192" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="268" y="192" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="297" y="209" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 D</text>

    <rect x="336" y="192" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="336" y="192" width="58" height="26" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="365" y="209" fill="#c4b5fd" font-size="8" text-anchor="middle">对话 4</text>

    <rect x="404" y="192" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="404" y="192" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="433" y="209" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 E</text>

    <rect x="472" y="192" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="472" y="192" width="58" height="26" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="501" y="209" fill="#c4b5fd" font-size="8" text-anchor="middle">对话 5</text>
  </g>
  <!-- 第三排（快堆到边缘） -->
  <g>
    <rect x="200" y="226" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="200" y="226" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="229" y="243" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 F</text>

    <rect x="268" y="226" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="268" y="226" width="58" height="26" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="297" y="243" fill="#c4b5fd" font-size="8" text-anchor="middle">对话 6</text>

    <rect x="336" y="226" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="336" y="226" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="365" y="243" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 G</text>

    <rect x="404" y="226" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="404" y="226" width="58" height="26" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="433" y="243" fill="#c4b5fd" font-size="8" text-anchor="middle">对话 7</text>

    <rect x="472" y="226" width="58" height="26" rx="3" fill="#0f172a"/>
    <rect x="472" y="226" width="58" height="26" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
    <text x="501" y="243" fill="#7dd3fc" font-size="8" text-anchor="middle">文件 H</text>
  </g>

  <!-- 容量条：几乎满 -->
  <rect x="200" y="266" width="330" height="14" rx="7" fill="#0f172a"/>
  <rect x="200" y="266" width="330" height="14" rx="7" fill="rgba(30,41,59,0.6)" stroke="#475569" stroke-width="1"/>
  <rect x="202" y="268" width="300" height="10" rx="5" fill="rgba(251,191,36,0.55)"/>
  <text x="544" y="276" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">约 92%</text>

  <!-- ===================== 分叉：两条动作箭头 ===================== -->
  <!-- 工作台底部中心向下，再左右分叉 -->
  <line x1="380" y1="298" x2="380" y2="328" stroke="#64748b" stroke-width="1.6"/>
  <!-- 左分支：去 /compact -->
  <path d="M 380 328 L 215 328 L 215 372" fill="none" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <text x="248" y="322" fill="#34d399" font-size="9" font-weight="600">压一压，留要点</text>
  <!-- 右分支：去 /clear -->
  <path d="M 380 328 L 545 328 L 545 372" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrow-cyan)"/>
  <text x="512" y="322" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="end">直接扫空，从头来</text>

  <!-- ===================== 左下：/compact ===================== -->
  <rect x="80" y="376" width="280" height="186" rx="8" fill="#0f172a"/>
  <rect x="80" y="376" width="280" height="186" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.8"/>

  <!-- 标题胶囊 -->
  <rect x="96" y="390" width="118" height="26" rx="13" fill="#0f172a"/>
  <rect x="96" y="390" width="118" height="26" rx="13" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1.2"/>
  <text x="155" y="407" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">/compact</text>
  <text x="226" y="408" fill="#cbd5e1" font-size="10" font-weight="600">压成要点</text>

  <!-- 图示：一摞草稿 -> 压 -> 一页要点 -->
  <!-- 一摞草稿（多层叠放） -->
  <g>
    <rect x="104" y="470" width="60" height="74" rx="4" fill="#0f172a"/>
    <rect x="104" y="470" width="60" height="74" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="110" y="462" width="60" height="74" rx="4" fill="#0f172a"/>
    <rect x="110" y="462" width="60" height="74" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1" stroke-opacity="0.7"/>
    <rect x="116" y="454" width="60" height="74" rx="4" fill="#0f172a"/>
    <rect x="116" y="454" width="60" height="74" rx="4" fill="rgba(6,78,59,0.45)" stroke="#34d399" stroke-width="1.2"/>
    <!-- 草稿上的横线 -->
    <line x1="124" y1="468" x2="168" y2="468" stroke="#64748b" stroke-width="1"/>
    <line x1="124" y1="478" x2="168" y2="478" stroke="#64748b" stroke-width="1"/>
    <line x1="124" y1="488" x2="168" y2="488" stroke="#64748b" stroke-width="1"/>
    <line x1="124" y1="498" x2="160" y2="498" stroke="#64748b" stroke-width="1"/>
    <line x1="124" y1="508" x2="168" y2="508" stroke="#64748b" stroke-width="1"/>
    <line x1="124" y1="518" x2="152" y2="518" stroke="#64748b" stroke-width="1"/>
    <text x="146" y="540" fill="#94a3b8" font-size="8" text-anchor="middle">一摞草稿</text>
  </g>

  <!-- 压缩箭头 -->
  <line x1="184" y1="498" x2="228" y2="498" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <text x="206" y="490" fill="#34d399" font-size="8" text-anchor="middle">压</text>

  <!-- 一页要点 -->
  <g>
    <rect x="248" y="460" width="64" height="64" rx="4" fill="#0f172a"/>
    <rect x="248" y="460" width="64" height="64" rx="4" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <!-- 要点条目（带勾） -->
    <line x1="258" y1="474" x2="262" y2="478" stroke="#34d399" stroke-width="1.3"/>
    <line x1="262" y1="478" x2="268" y2="470" stroke="#34d399" stroke-width="1.3"/>
    <line x1="274" y1="475" x2="304" y2="475" stroke="#cbd5e1" stroke-width="1.2"/>
    <line x1="258" y1="490" x2="262" y2="494" stroke="#34d399" stroke-width="1.3"/>
    <line x1="262" y1="494" x2="268" y2="486" stroke="#34d399" stroke-width="1.3"/>
    <line x1="274" y1="491" x2="304" y2="491" stroke="#cbd5e1" stroke-width="1.2"/>
    <line x1="258" y1="506" x2="262" y2="510" stroke="#34d399" stroke-width="1.3"/>
    <line x1="262" y1="510" x2="268" y2="502" stroke="#34d399" stroke-width="1.3"/>
    <line x1="274" y1="507" x2="298" y2="507" stroke="#cbd5e1" stroke-width="1.2"/>
    <text x="280" y="540" fill="#34d399" font-size="8" font-weight="600" text-anchor="middle">一页要点</text>
  </g>

  <!-- 说明 -->
  <text x="96" y="436" fill="#94a3b8" font-size="9">把聊到现在的内容总结成摘要，</text>
  <text x="96" y="449" fill="#94a3b8" font-size="9">关键结论 / 决定还在，台面腾出来。</text>

  <!-- ===================== 右下：/clear ===================== -->
  <rect x="400" y="376" width="280" height="186" rx="8" fill="#0f172a"/>
  <rect x="400" y="376" width="280" height="186" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.8"/>

  <!-- 标题胶囊 -->
  <rect x="416" y="390" width="100" height="26" rx="13" fill="#0f172a"/>
  <rect x="416" y="390" width="100" height="26" rx="13" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="466" y="407" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">/clear</text>
  <text x="528" y="408" fill="#cbd5e1" font-size="10" font-weight="600">整个扫空</text>

  <!-- 说明 -->
  <text x="416" y="436" fill="#94a3b8" font-size="9">一笔勾销，之前聊的全部清掉，</text>
  <text x="416" y="449" fill="#94a3b8" font-size="9">回到刚打开时的空白台面。</text>

  <!-- 图示：扫空的台面 + 扫帚动作线 + 从头开始的新方块 -->
  <!-- 空台面（虚线框，里面没东西） -->
  <g>
    <rect x="424" y="462" width="118" height="82" rx="5" fill="#0f172a"/>
    <rect x="424" y="462" width="118" height="82" rx="5" fill="rgba(30,41,59,0.35)" stroke="#475569" stroke-width="1.2" stroke-dasharray="6,4"/>
    <!-- 扫过的痕迹（斜向动作线） -->
    <line x1="436" y1="520" x2="470" y2="486" stroke="#22d3ee" stroke-width="1.4" stroke-opacity="0.7"/>
    <line x1="448" y1="528" x2="486" y2="490" stroke="#22d3ee" stroke-width="1.4" stroke-opacity="0.55"/>
    <line x1="462" y1="532" x2="500" y2="494" stroke="#22d3ee" stroke-width="1.4" stroke-opacity="0.4"/>
    <text x="483" y="540" fill="#64748b" font-size="8" text-anchor="middle">台面扫空</text>
  </g>

  <!-- 扫向箭头 -->
  <line x1="552" y1="500" x2="586" y2="500" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- 从头开始的一个新方块 -->
  <g>
    <rect x="602" y="470" width="60" height="64" rx="4" fill="#0f172a"/>
    <rect x="602" y="470" width="60" height="64" rx="4" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="632" y="498" fill="white" font-size="11" font-weight="700" text-anchor="middle">+</text>
    <text x="632" y="516" fill="#7dd3fc" font-size="8" text-anchor="middle">新对话</text>
    <text x="632" y="548" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle">从头开始</text>
  </g>

  <!-- ===================== 底部对照提示 ===================== -->
  <text x="80" y="585" fill="#34d399" font-size="9" font-weight="600">/compact：保留要点，连贯继续</text>
  <text x="680" y="585" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="end">/clear：清空记忆，换个话题</text>
</svg>
