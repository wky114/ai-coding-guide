<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-orange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#fb923c"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">MCP：把 Claude Code 接到够不着的外部世界</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">通过 MCP 这一层，自带的本地工具和原本碰不到的外部服务接到一块</text>

  <!-- ===================== 三列区位标签 ===================== -->
  <text x="170" y="92" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">自带本地工具</text>
  <text x="560" y="92" fill="#fb923c" font-size="11" font-weight="600" text-anchor="middle">MCP 层 · 统一对接口</text>
  <text x="952" y="92" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">外部服务（原本够不着）</text>

  <!-- ===================== 连接箭头（先画，被框盖住下半截） ===================== -->
  <!-- 左：Claude Code → MCP 层 -->
  <path d="M 300 290 L 420 290" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <rect x="318" y="262" width="86" height="22" rx="11" fill="#0f172a"/>
  <text x="361" y="277" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">调用工具 →</text>

  <!-- 右：MCP 层 → 四个外部服务（L 形分流） -->
  <!-- → GitHub -->
  <path d="M 700 235 L 740 235 L 740 162 L 788 162" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <!-- → Jira -->
  <path d="M 700 268 L 762 268 L 762 256 L 788 256" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <!-- → PostgreSQL -->
  <path d="M 700 312 L 762 312 L 762 352 L 788 352" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
  <!-- → Figma / Sentry -->
  <path d="M 700 345 L 740 345 L 740 448 L 788 448" fill="none" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>

  <!-- ===================== 左区：Claude Code 边界 ===================== -->
  <rect x="40" y="108" width="260" height="364" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- Claude Code 主体 -->
  <rect x="72" y="138" width="196" height="58" rx="8" fill="#0f172a"/>
  <rect x="72" y="138" width="196" height="58" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="170" y="164" fill="white" font-size="12" font-weight="600" text-anchor="middle">Claude Code</text>
  <text x="170" y="182" fill="#94a3b8" font-size="9" text-anchor="middle">你这台机器上的本体</text>

  <!-- 读写本地文件 -->
  <rect x="72" y="222" width="196" height="52" rx="8" fill="#0f172a"/>
  <rect x="72" y="222" width="196" height="52" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.3"/>
  <text x="170" y="244" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">读写本地文件</text>
  <text x="170" y="261" fill="#94a3b8" font-size="9" text-anchor="middle">看代码 · 改代码</text>

  <!-- 执行命令行 -->
  <rect x="72" y="300" width="196" height="52" rx="8" fill="#0f172a"/>
  <rect x="72" y="300" width="196" height="52" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.3"/>
  <text x="170" y="322" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">执行命令行</text>
  <text x="170" y="339" fill="#94a3b8" font-size="9" text-anchor="middle">跑测试 · 装依赖</text>

  <!-- 左区脚注 -->
  <text x="170" y="452" fill="#64748b" font-size="9" text-anchor="middle">出厂自带，开箱即用</text>

  <!-- ===================== 中区：MCP 层（扩展坞） ===================== -->
  <rect x="420" y="138" width="280" height="334" rx="12" fill="#0f172a"/>
  <rect x="420" y="138" width="280" height="334" rx="12" fill="rgba(251,146,60,0.14)" stroke="#fb923c" stroke-width="2"/>
  <text x="560" y="166" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle">MCP 层</text>
  <text x="560" y="184" fill="#cbd5e1" font-size="9" text-anchor="middle">像扩展坞：一个口插上，外设全通</text>

  <!-- stdio 传输 -->
  <rect x="452" y="216" width="216" height="78" rx="8" fill="#0f172a"/>
  <rect x="452" y="216" width="216" height="78" rx="8" fill="rgba(251,146,60,0.22)" stroke="#fb923c" stroke-width="1.4"/>
  <text x="560" y="240" fill="white" font-size="11" font-weight="600" text-anchor="middle">stdio 传输</text>
  <text x="560" y="258" fill="#fdba74" font-size="9" text-anchor="middle">本地进程</text>
  <text x="560" y="277" fill="#94a3b8" font-size="9" text-anchor="middle">在你机器上起个小程序</text>

  <!-- HTTP 传输 -->
  <rect x="452" y="316" width="216" height="78" rx="8" fill="#0f172a"/>
  <rect x="452" y="316" width="216" height="78" rx="8" fill="rgba(251,146,60,0.22)" stroke="#fb923c" stroke-width="1.4"/>
  <text x="560" y="340" fill="white" font-size="11" font-weight="600" text-anchor="middle">HTTP 传输</text>
  <text x="560" y="358" fill="#fdba74" font-size="9" text-anchor="middle">远程托管</text>
  <text x="560" y="377" fill="#94a3b8" font-size="9" text-anchor="middle">连云端的现成服务</text>

  <!-- 中区脚注 -->
  <text x="560" y="452" fill="#cbd5e1" font-size="9" text-anchor="middle">两种接法，同一套协议</text>

  <!-- ===================== 右区：外部服务边界 ===================== -->
  <rect x="788" y="108" width="292" height="364" rx="12" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- GitHub（次要：服务，绿） -->
  <rect x="800" y="138" width="268" height="48" rx="8" fill="#0f172a"/>
  <rect x="800" y="138" width="268" height="48" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.4"/>
  <text x="934" y="159" fill="white" font-size="11" font-weight="600" text-anchor="middle">GitHub</text>
  <text x="934" y="175" fill="#94a3b8" font-size="9" text-anchor="middle">读 PR · 提 issue · 看仓库</text>

  <!-- Jira / 问题跟踪器（次要：服务，绿） -->
  <rect x="800" y="232" width="268" height="48" rx="8" fill="#0f172a"/>
  <rect x="800" y="232" width="268" height="48" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.4"/>
  <text x="934" y="253" fill="white" font-size="11" font-weight="600" text-anchor="middle">Jira · 问题跟踪器</text>
  <text x="934" y="269" fill="#94a3b8" font-size="9" text-anchor="middle">查工单 · 改状态</text>

  <!-- PostgreSQL（数据库圆柱，紫） -->
  <g>
    <rect x="848" y="334" width="172" height="40" fill="#0f172a"/>
    <ellipse cx="934" cy="334" rx="86" ry="11" fill="#0f172a"/>
    <ellipse cx="934" cy="374" rx="86" ry="11" fill="#0f172a"/>
    <rect x="848" y="334" width="172" height="40" fill="rgba(76,29,149,0.4)"/>
    <line x1="848" y1="334" x2="848" y2="374" stroke="#a78bfa" stroke-width="1.4"/>
    <line x1="1020" y1="334" x2="1020" y2="374" stroke="#a78bfa" stroke-width="1.4"/>
    <ellipse cx="934" cy="374" rx="86" ry="11" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.4"/>
    <ellipse cx="934" cy="334" rx="86" ry="11" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.4"/>
    <text x="934" y="352" fill="white" font-size="11" font-weight="600" text-anchor="middle">PostgreSQL 数据库</text>
    <text x="934" y="367" fill="#cbd5e1" font-size="9" text-anchor="middle">直接查表 · 看 schema</text>
  </g>

  <!-- Figma / Sentry（中性：外部，灰） -->
  <rect x="800" y="424" width="268" height="48" rx="8" fill="#0f172a"/>
  <rect x="800" y="424" width="268" height="48" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="934" y="445" fill="white" font-size="11" font-weight="600" text-anchor="middle">Figma 设计稿 · Sentry 监控</text>
  <text x="934" y="461" fill="#94a3b8" font-size="9" text-anchor="middle">取设计 · 拉报错</text>

  <!-- ===================== 底部一句话 ===================== -->
  <text x="40" y="512" fill="#64748b" font-size="9">说白了：本地工具是「手」，MCP 是「插线板」——一边接好 Claude Code，一边接上 GitHub、数据库、设计稿，原本够不着的全能用了。</text>
</svg>
