<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="26" y="36" fill="white" font-size="16" font-weight="700">Claude Code 的代理循环</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">想 → 做 → 看，转圈直到把事办完</text>

  <!-- 入口 -->
  <rect x="160" y="74" width="160" height="44" rx="22" fill="#0f172a"/>
  <rect x="160" y="74" width="160" height="44" rx="22" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="240" y="101" fill="white" font-size="12" font-weight="600" text-anchor="middle">你的 Prompt</text>
  <line x1="240" y1="118" x2="240" y2="154" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 想 -->
  <rect x="156" y="156" width="168" height="62" rx="6" fill="#0f172a"/>
  <rect x="156" y="156" width="168" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="240" y="183" fill="white" font-size="13" font-weight="600" text-anchor="middle">想</text>
  <text x="240" y="202" fill="#94a3b8" font-size="9" text-anchor="middle">收集上下文：读文件 / 看报错</text>
  <line x1="240" y1="218" x2="240" y2="254" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 做 -->
  <rect x="156" y="256" width="168" height="62" rx="6" fill="#0f172a"/>
  <rect x="156" y="256" width="168" height="62" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="240" y="283" fill="white" font-size="13" font-weight="600" text-anchor="middle">做</text>
  <text x="240" y="302" fill="#94a3b8" font-size="9" text-anchor="middle">采取行动：改代码 / 跑命令</text>
  <line x1="240" y1="318" x2="240" y2="354" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 看 -->
  <rect x="156" y="356" width="168" height="62" rx="6" fill="#0f172a"/>
  <rect x="156" y="356" width="168" height="62" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="240" y="383" fill="white" font-size="13" font-weight="600" text-anchor="middle">看</text>
  <text x="240" y="402" fill="#94a3b8" font-size="9" text-anchor="middle">验证结果：跑测试 / 看输出</text>
  <line x1="240" y1="418" x2="240" y2="450" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 决策 -->
  <polygon points="240,450 302,492 240,534 178,492" fill="#0f172a"/>
  <polygon points="240,450 302,492 240,534 178,492" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="240" y="496" fill="white" font-size="11" font-weight="600" text-anchor="middle">满意？</text>

  <!-- 是 → 完成 -->
  <line x1="240" y1="534" x2="240" y2="566" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="556" fill="#34d399" font-size="9">是</text>
  <rect x="160" y="568" width="160" height="42" rx="21" fill="#0f172a"/>
  <rect x="160" y="568" width="160" height="42" rx="21" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="240" y="594" fill="white" font-size="12" font-weight="600" text-anchor="middle">完成 ✓</text>

  <!-- 否 → 回环到「想」 -->
  <path d="M 178,492 H 92 V 187 H 154" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>
  <text x="108" y="486" fill="#fb7185" font-size="9">否</text>
  <text x="84" y="360" fill="#fb7185" font-size="9" transform="rotate(-90 84,360)">不满意，再来一轮</text>

  <!-- Esc 旁注 -->
  <text x="334" y="284" fill="#fbbf24" font-size="9">⎋ 随时按 Esc</text>
  <text x="349" y="298" fill="#fbbf24" font-size="9">把它叫停</text>
  <line x1="330" y1="288" x2="326" y2="287" stroke="#fbbf24" stroke-width="1"/>
</svg>
