<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="33%" stop-color="#22d3ee"/>
      <stop offset="66%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">权限松紧光谱</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">从步步问到全裸奔，看你在哪用</text>

  <!-- 「严 ←→ 松」方向标尺（顶部右侧） -->
  <text x="868" y="40" fill="#34d399" font-size="10" font-weight="600">最严</text>
  <line x1="908" y1="36" x2="1018" y2="36" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="1026" y="40" fill="#fb7185" font-size="10" font-weight="600">最松</text>

  <!-- ===== 光谱条：绿 → 青 → 琥珀 → 玫红 ===== -->
  <rect x="60" y="86" width="1000" height="28" rx="14" fill="#0f172a"/>
  <rect x="60" y="86" width="1000" height="28" rx="14" fill="url(#spectrum)" opacity="0.92"/>
  <!-- 四档分隔刻度 -->
  <line x1="310" y1="86" x2="310" y2="114" stroke="#0f172a" stroke-width="2"/>
  <line x1="560" y1="86" x2="560" y2="114" stroke="#0f172a" stroke-width="2"/>
  <line x1="810" y1="86" x2="810" y2="114" stroke="#0f172a" stroke-width="2"/>
  <!-- 档位标号写在光谱条内 -->
  <text x="185" y="105" fill="#06281d" font-size="12" font-weight="700" text-anchor="middle">①</text>
  <text x="435" y="105" fill="#06303a" font-size="12" font-weight="700" text-anchor="middle">②</text>
  <text x="685" y="105" fill="#3a2206" font-size="12" font-weight="700" text-anchor="middle">③</text>
  <text x="935" y="105" fill="#3a0a1d" font-size="12" font-weight="700" text-anchor="middle">④</text>

  <!-- 光谱条到卡片的连接小箭头 -->
  <line x1="176" y1="116" x2="176" y2="174" stroke="#34d399" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="426" y1="116" x2="426" y2="174" stroke="#22d3ee" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="676" y1="116" x2="676" y2="174" stroke="#fbbf24" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="926" y1="116" x2="926" y2="174" stroke="#fb7185" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- 卡片：x = 60 / 310 / 560 / 810，宽 232，间距 18，y=178，高 224 -->
  <!-- ============================================================ -->

  <!-- ① plan / default —— 绿（最严） -->
  <rect x="60" y="178" width="232" height="224" rx="8" fill="#0f172a"/>
  <rect x="60" y="178" width="232" height="224" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="176" y="206" fill="white" font-size="13" font-weight="700" text-anchor="middle">plan / default</text>
  <text x="176" y="224" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">只读 · 步步问</text>
  <line x1="84" y1="238" x2="268" y2="238" stroke="#34d399" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="84" y="262" fill="#94a3b8" font-size="10" font-weight="600">会不会问你</text>
  <text x="84" y="282" fill="#e2e8f0" font-size="10">每一步都要你点头</text>
  <text x="84" y="300" fill="#cbd5e1" font-size="9">改文件、跑命令全拦下来</text>
  <line x1="84" y1="318" x2="268" y2="318" stroke="#334155" stroke-width="0.6"/>
  <text x="84" y="342" fill="#94a3b8" font-size="10" font-weight="600">典型场景</text>
  <text x="84" y="362" fill="#e2e8f0" font-size="10">探索 / 敏感工作</text>
  <text x="84" y="380" fill="#cbd5e1" font-size="9">先看清再说，怕它乱动</text>

  <!-- ② acceptEdits —— 青 -->
  <rect x="310" y="178" width="232" height="224" rx="8" fill="#0f172a"/>
  <rect x="310" y="178" width="232" height="224" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="426" y="206" fill="white" font-size="13" font-weight="700" text-anchor="middle">acceptEdits</text>
  <text x="426" y="224" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">改码免问</text>
  <line x1="334" y1="238" x2="518" y2="238" stroke="#22d3ee" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="334" y="262" fill="#94a3b8" font-size="10" font-weight="600">会不会问你</text>
  <text x="334" y="282" fill="#e2e8f0" font-size="10">改文件自动放行</text>
  <text x="334" y="300" fill="#cbd5e1" font-size="9">跑命令、删东西仍要问</text>
  <line x1="334" y1="318" x2="518" y2="318" stroke="#334155" stroke-width="0.6"/>
  <text x="334" y="342" fill="#94a3b8" font-size="10" font-weight="600">典型场景</text>
  <text x="334" y="362" fill="#e2e8f0" font-size="10">迭代审查中的代码</text>
  <text x="334" y="380" fill="#cbd5e1" font-size="9">你盯着 diff，连续多轮改</text>

  <!-- ③ auto —— 琥珀 -->
  <rect x="560" y="178" width="232" height="224" rx="8" fill="#0f172a"/>
  <rect x="560" y="178" width="232" height="224" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <text x="676" y="206" fill="white" font-size="13" font-weight="700" text-anchor="middle">auto</text>
  <text x="676" y="224" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">分类器兜底 · 基本不问</text>
  <line x1="584" y1="238" x2="768" y2="238" stroke="#fbbf24" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="584" y="262" fill="#94a3b8" font-size="10" font-weight="600">会不会问你</text>
  <text x="584" y="282" fill="#e2e8f0" font-size="10">模型自己判风险</text>
  <text x="584" y="300" fill="#cbd5e1" font-size="9">觉得危险才停下来问</text>
  <line x1="584" y1="318" x2="768" y2="318" stroke="#334155" stroke-width="0.6"/>
  <text x="584" y="342" fill="#94a3b8" font-size="10" font-weight="600">典型场景</text>
  <text x="584" y="362" fill="#e2e8f0" font-size="10">长任务 · 研究预览版</text>
  <text x="584" y="380" fill="#cbd5e1" font-size="9">不想全程守着点确认</text>

  <!-- ④ bypassPermissions —— 玫红（最松） -->
  <rect x="810" y="178" width="232" height="224" rx="8" fill="#0f172a"/>
  <rect x="810" y="178" width="232" height="224" rx="8" fill="rgba(136,19,55,0.35)" stroke="#fb7185" stroke-width="2"/>
  <text x="926" y="206" fill="white" font-size="13" font-weight="700" text-anchor="middle">bypassPermissions</text>
  <text x="926" y="224" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">完全裸奔 · 跳过一切</text>
  <line x1="834" y1="238" x2="1018" y2="238" stroke="#fb7185" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="834" y="262" fill="#94a3b8" font-size="10" font-weight="600">会不会问你</text>
  <text x="834" y="282" fill="#e2e8f0" font-size="10">什么都不问</text>
  <text x="834" y="300" fill="#cbd5e1" font-size="9">改、删、跑，一路放行</text>
  <line x1="834" y1="318" x2="1018" y2="318" stroke="#334155" stroke-width="0.6"/>
  <text x="834" y="342" fill="#94a3b8" font-size="10" font-weight="600">典型场景</text>
  <text x="834" y="362" fill="#fb7185" font-size="10" font-weight="600">仅隔离容器</text>
  <text x="834" y="380" fill="#cbd5e1" font-size="9">出事炸不到你本机才用</text>

  <!-- 底部一句话 -->
  <text x="60" y="438" fill="#64748b" font-size="9">越往右越省心也越危险：放权前先想清楚，这台机器出了事你扛不扛得住。</text>
</svg>
