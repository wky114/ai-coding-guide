<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#34d399"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">子代理：脏活留在它房间，只有结论回主线</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">独立上下文 · 独立工具 · 干完只交一句摘要</text>

  <!-- ================= 左：主对话（你的工作台）边界 ================= -->
  <rect x="48" y="86" width="430" height="408" rx="12" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="64" y="108" fill="#60a5fa" font-size="11" font-weight="600">主对话（你的工作台）</text>

  <!-- 你 -->
  <rect x="84" y="132" width="160" height="60" rx="8" fill="#0f172a"/>
  <rect x="84" y="132" width="160" height="60" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="164" y="158" fill="white" font-size="12" font-weight="600" text-anchor="middle">你 + Claude</text>
  <text x="164" y="176" fill="#94a3b8" font-size="9" text-anchor="middle">主线对话，台面要干净</text>

  <!-- 脏活（待外包） -->
  <rect x="84" y="232" width="332" height="86" rx="8" fill="#0f172a"/>
  <rect x="84" y="232" width="332" height="86" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="250" y="258" fill="white" font-size="12" font-weight="600" text-anchor="middle">一个会刷出大量输出的脏活</text>
  <text x="250" y="280" fill="#fbbf24" font-size="10" text-anchor="middle">跑测试 / 翻日志 / 试调接口</text>
  <text x="250" y="300" fill="#cbd5e1" font-size="9" text-anchor="middle">几百上千行中间垃圾，你压根不会再看第二眼</text>

  <!-- 台面始终干净 -->
  <rect x="84" y="402" width="332" height="64" rx="8" fill="#0f172a"/>
  <rect x="84" y="402" width="332" height="64" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="428" fill="white" font-size="12" font-weight="600" text-anchor="middle">主对话台面：干净如初</text>
  <text x="250" y="448" fill="#cbd5e1" font-size="9" text-anchor="middle">只多了一行结论，思路没被打断</text>

  <!-- ================= 右：子代理（外包小弟的房间）边界 ================= -->
  <rect x="642" y="86" width="430" height="408" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="658" y="108" fill="#34d399" font-size="11" font-weight="600">子代理（外包小弟，独立上下文房间）</text>

  <!-- 任务交代（入口） -->
  <rect x="688" y="132" width="340" height="60" rx="8" fill="#0f172a"/>
  <rect x="688" y="132" width="340" height="60" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="858" y="158" fill="white" font-size="12" font-weight="600" text-anchor="middle">从白纸起步，只收到一句「任务交代」</text>
  <text x="858" y="176" fill="#94a3b8" font-size="9" text-anchor="middle">看不到你们之前聊过啥</text>

  <!-- 在自己房间扛全部细节 -->
  <rect x="688" y="232" width="340" height="86" rx="8" fill="#0f172a"/>
  <rect x="688" y="232" width="340" height="86" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="858" y="258" fill="white" font-size="12" font-weight="600" text-anchor="middle">在自己桌上扛下全部细节</text>
  <text x="858" y="280" fill="#fbbf24" font-size="10" text-anchor="middle">那几百上千行，全堆在它的上下文里</text>
  <text x="858" y="300" fill="#cbd5e1" font-size="9" text-anchor="middle">独立工具 / 独立权限：只读还是能写，你说了算</text>

  <!-- 只产出一行摘要 -->
  <rect x="688" y="402" width="340" height="64" rx="8" fill="#0f172a"/>
  <rect x="688" y="402" width="340" height="64" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="858" y="428" fill="white" font-size="12" font-weight="600" text-anchor="middle">只产出一张「结论纸条」</text>
  <text x="858" y="448" fill="#cbd5e1" font-size="9" text-anchor="middle">报错就这三条，在第 207 / 589 / 903 行</text>

  <!-- ================= 跨房间的两条主箭头 ================= -->
  <!-- 外包：脏活 → 子代理 -->
  <path d="M 416 262 L 540 262 L 540 162 L 684 162" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <rect x="500" y="200" width="120" height="22" rx="11" fill="#0f172a"/>
  <text x="560" y="215" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">外包出去 →</text>

  <!-- 回灌：摘要 → 主对话 -->
  <path d="M 684 434 L 540 434 L 540 434 L 420 434" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <rect x="498" y="404" width="124" height="22" rx="11" fill="#0f172a"/>
  <text x="560" y="419" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">← 只回一句结论</text>

  <!-- 中间竖向隔断提示 -->
  <text x="560" y="300" fill="#475569" font-size="9" font-weight="600" text-anchor="middle">两套上下文</text>
  <text x="560" y="314" fill="#475569" font-size="9" font-weight="600" text-anchor="middle">互不串台</text>

  <!-- 底部一句话 -->
  <text x="48" y="528" fill="#64748b" font-size="9">关键：详细输出留在子代理上下文，只有摘要回到主对话——但开太多子代理、个个回灌一大坨，照样把台面堆满。</text>
</svg>
