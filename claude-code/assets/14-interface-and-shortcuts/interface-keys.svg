<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">界面三块 + 高频键</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">认住输入框、状态行、模式提示，手放对地方</text>

  <!-- ============ 左侧：终端窗口框 ============ -->
  <!-- 窗口外框（不透明底 + 边框） -->
  <rect x="40" y="82" width="404" height="470" rx="10" fill="#0f172a"/>
  <rect x="40" y="82" width="404" height="470" rx="10" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1.5"/>

  <!-- 窗口标题栏 -->
  <path d="M 40 92 a10 10 0 0 1 10 -10 H 434 a10 10 0 0 1 10 10 V 112 H 40 Z" fill="#1e293b"/>
  <circle cx="62" cy="97" r="5" fill="#fb7185"/>
  <circle cx="80" cy="97" r="5" fill="#fbbf24"/>
  <circle cx="98" cy="97" r="5" fill="#34d399"/>
  <text x="242" y="101" fill="#94a3b8" font-size="9" text-anchor="middle">Claude Code 终端</text>
  <line x1="40" y1="112" x2="444" y2="112" stroke="#475569" stroke-width="1"/>

  <!-- 第一块：对话滚动区（灰） -->
  <rect x="56" y="126" width="372" height="222" rx="6" fill="#0f172a"/>
  <rect x="56" y="126" width="372" height="222" rx="6" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="1.5"/>
  <text x="68" y="146" fill="#94a3b8" font-size="11" font-weight="600">对话滚动区</text>
  <text x="416" y="146" fill="#64748b" font-size="9" text-anchor="end">上 · 灰</text>
  <!-- 对话内容示意行 -->
  <text x="68" y="172" fill="#64748b" font-size="9">&gt; 帮我看下这个报错</text>
  <text x="68" y="192" fill="#94a3b8" font-size="9">我先读一下相关文件……</text>
  <text x="68" y="212" fill="#94a3b8" font-size="9">已定位到 utils.py 第 42 行</text>
  <line x1="68" y1="226" x2="340" y2="226" stroke="#334155" stroke-width="0.5"/>
  <text x="68" y="246" fill="#64748b" font-size="9">&gt; 那帮我改掉</text>
  <text x="68" y="266" fill="#94a3b8" font-size="9">正在修改 utils.py……</text>
  <text x="68" y="286" fill="#94a3b8" font-size="9">改完了，跑测试验证</text>
  <text x="68" y="306" fill="#34d399" font-size="9">测试通过 ✓</text>
  <text x="68" y="332" fill="#64748b" font-size="9">你来我往的历史都堆在这儿，可上下滚</text>

  <!-- 第二块：状态行 / 模式提示（青色高亮） -->
  <rect x="56" y="360" width="372" height="50" rx="6" fill="#0f172a"/>
  <rect x="56" y="360" width="372" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="68" y="380" fill="#22d3ee" font-size="11" font-weight="600">状态行 / 模式提示</text>
  <text x="416" y="380" fill="#22d3ee" font-size="9" text-anchor="end">中 · 高亮</text>
  <text x="68" y="400" fill="white" font-size="11" font-weight="600">default  /  acceptEdits  /  plan</text>

  <!-- 第三块：输入框（蓝色，带 > 提示符） -->
  <rect x="56" y="422" width="372" height="58" rx="6" fill="#0f172a"/>
  <rect x="56" y="422" width="372" height="58" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="68" y="442" fill="#60a5fa" font-size="11" font-weight="600">输入框</text>
  <text x="416" y="442" fill="#60a5fa" font-size="9" text-anchor="end">下 · 蓝</text>
  <text x="68" y="467" fill="#60a5fa" font-size="14" font-weight="700">&gt;</text>
  <text x="84" y="467" fill="white" font-size="11">在这儿打字，回车发给 Claude</text>
  <rect x="300" y="457" width="2" height="14" fill="#60a5fa"/>

  <!-- 三块层级说明（窗口框右外侧细标，竖排省略，改放窗口下方） -->
  <text x="242" y="538" fill="#64748b" font-size="9" text-anchor="middle">一个窗口，从上到下就这三块</text>

  <!-- ============ 右侧：5 个快捷键标签 ============ -->

  <!-- Esc = 刹车（停）→ 指向对话滚动区 -->
  <rect x="540" y="118" width="210" height="46" rx="6" fill="#0f172a"/>
  <rect x="540" y="118" width="210" height="46" rx="6" fill="rgba(136,19,55,0.35)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="556" y="139" fill="white" font-size="13" font-weight="700">Esc</text>
  <text x="600" y="139" fill="#fb7185" font-size="11" font-weight="600">= 刹车（停）</text>
  <text x="556" y="156" fill="#94a3b8" font-size="9">它正干活，按一下立刻打断</text>
  <line x1="540" y1="150" x2="432" y2="210" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- 双击 Esc = 倒车（回溯）→ 指向对话滚动区 -->
  <rect x="540" y="186" width="210" height="46" rx="6" fill="#0f172a"/>
  <rect x="540" y="186" width="210" height="46" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="556" y="207" fill="white" font-size="13" font-weight="700">双击 Esc</text>
  <text x="624" y="207" fill="#fbbf24" font-size="11" font-weight="600">= 倒车（回溯）</text>
  <text x="556" y="224" fill="#94a3b8" font-size="9">跳回前面某条消息重来</text>
  <line x1="540" y1="218" x2="432" y2="250" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Shift+Tab = 切模式 → 指向状态行（青） -->
  <rect x="540" y="362" width="210" height="46" rx="6" fill="#0f172a"/>
  <rect x="540" y="362" width="210" height="46" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="556" y="383" fill="white" font-size="13" font-weight="700">Shift+Tab</text>
  <text x="640" y="383" fill="#22d3ee" font-size="11" font-weight="600">= 切模式</text>
  <text x="556" y="400" fill="#94a3b8" font-size="9">在上面三种模式间轮换</text>
  <line x1="540" y1="385" x2="432" y2="385" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Ctrl+C = 清场 → 指向输入框 -->
  <rect x="540" y="430" width="210" height="46" rx="6" fill="#0f172a"/>
  <rect x="540" y="430" width="210" height="46" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="556" y="451" fill="white" font-size="13" font-weight="700">Ctrl+C</text>
  <text x="624" y="451" fill="#a78bfa" font-size="11" font-weight="600">= 清场</text>
  <text x="556" y="468" fill="#94a3b8" font-size="9">清空当前没发出去的输入</text>
  <line x1="540" y1="453" x2="432" y2="453" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- Ctrl+D = 退场 → 指向整个窗口 -->
  <rect x="540" y="498" width="210" height="46" rx="6" fill="#0f172a"/>
  <rect x="540" y="498" width="210" height="46" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="556" y="519" fill="white" font-size="13" font-weight="700">Ctrl+D</text>
  <text x="624" y="519" fill="#94a3b8" font-size="11" font-weight="600">= 退场</text>
  <text x="556" y="536" fill="#94a3b8" font-size="9">直接退出，关掉整个会话</text>
  <line x1="540" y1="521" x2="448" y2="521" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- 底部图例 -->
  <text x="26" y="582" fill="#64748b" font-size="9">记住「停 / 回溯 / 清场 / 退场 / 切模式」这五个键，手就不会乱放。</text>
</svg>
