<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1110 600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#60a5fa"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="36" fill="white" font-size="16" font-weight="700">渐进式披露：平时只占一句，被命中才加载全文</text>
  <text x="26" y="55" fill="#94a3b8" font-size="10">每个 Skill 平时只在上下文里留一句 description，命中后才把那一份的完整正文展开</text>

  <!-- ================= 左：平时（待命态）边界 ================= -->
  <rect x="48" y="92" width="430" height="420" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="64" y="114" fill="#22d3ee" font-size="11" font-weight="600">平时：上下文里每个 Skill 只占一行</text>

  <!-- Skill A（一行 description） -->
  <rect x="80" y="138" width="366" height="44" rx="8" fill="#0f172a"/>
  <rect x="80" y="138" width="366" height="44" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="98" y="156" fill="white" font-size="11" font-weight="600">Skill A</text>
  <text x="98" y="173" fill="#94a3b8" font-size="9">description：一句话说清「我管什么」</text>

  <!-- Skill B（一行 description，待命） -->
  <rect x="80" y="200" width="366" height="44" rx="8" fill="#0f172a"/>
  <rect x="80" y="200" width="366" height="44" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="98" y="218" fill="white" font-size="11" font-weight="600">Skill B</text>
  <text x="98" y="235" fill="#94a3b8" font-size="9">description：一句话说清「我管什么」</text>

  <!-- Skill C（一行 description） -->
  <rect x="80" y="262" width="366" height="44" rx="8" fill="#0f172a"/>
  <rect x="80" y="262" width="366" height="44" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="98" y="280" fill="white" font-size="11" font-weight="600">Skill C</text>
  <text x="98" y="297" fill="#94a3b8" font-size="9">description：一句话说清「我管什么」</text>

  <!-- 小结：上下文占用 -->
  <text x="98" y="344" fill="#34d399" font-size="9" font-weight="600">占用 = 三句话，正文都还没进来</text>

  <!-- 用户提问命中 Skill B -->
  <rect x="80" y="372" width="366" height="56" rx="8" fill="#0f172a"/>
  <rect x="80" y="372" width="366" height="56" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="263" y="396" fill="white" font-size="11" font-weight="600" text-anchor="middle">用户提问，命中 Skill B</text>
  <text x="263" y="416" fill="#fbbf24" font-size="9" text-anchor="middle">关键词对上 B 的 description，触发加载</text>

  <!-- 省下的：没点的菜谱压在抽屉里 -->
  <rect x="80" y="450" width="366" height="44" rx="8" fill="#0f172a"/>
  <rect x="80" y="450" width="366" height="44" rx="8" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="263" y="468" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle">没点的「菜谱」压在抽屉里</text>
  <text x="263" y="484" fill="#64748b" font-size="9" text-anchor="middle">A / C 的正文不进上下文，省下窗口</text>

  <!-- ================= 右：触发后（命中态）边界 ================= -->
  <rect x="638" y="92" width="430" height="420" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="654" y="114" fill="#34d399" font-size="11" font-weight="600">触发后：只把 Skill B 的全文展开</text>

  <!-- Skill A 仍只占一行 -->
  <rect x="670" y="138" width="366" height="44" rx="8" fill="#0f172a"/>
  <rect x="670" y="138" width="366" height="44" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="688" y="156" fill="#cbd5e1" font-size="11" font-weight="600">Skill A</text>
  <text x="688" y="173" fill="#94a3b8" font-size="9">仍只有一行 description，没动</text>

  <!-- Skill B 完整正文被加载（高亮 active） -->
  <rect x="670" y="200" width="366" height="150" rx="8" fill="#0f172a"/>
  <rect x="670" y="200" width="366" height="150" rx="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="2"/>
  <text x="688" y="222" fill="white" font-size="11" font-weight="700">Skill B　← 已命中，正文加载</text>
  <line x1="670" y1="232" x2="1036" y2="232" stroke="#60a5fa" stroke-width="0.6" stroke-opacity="0.6"/>
  <text x="688" y="252" fill="#dbeafe" font-size="9">完整正文：步骤、规则、示例、注意事项</text>
  <text x="688" y="270" fill="#dbeafe" font-size="9">本该这时才进上下文的所有细节</text>
  <text x="688" y="288" fill="#dbeafe" font-size="9">——「菜谱」从抽屉里取出，摊开在台面</text>
  <text x="688" y="306" fill="#dbeafe" font-size="9">关联文件 / 脚本按需再读，不一次塞满</text>
  <text x="688" y="332" fill="#60a5fa" font-size="9" font-weight="600">这一份，现在才占满它该占的篇幅</text>

  <!-- Skill C 仍只占一行 -->
  <rect x="670" y="368" width="366" height="44" rx="8" fill="#0f172a"/>
  <rect x="670" y="368" width="366" height="44" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="688" y="386" fill="#cbd5e1" font-size="11" font-weight="600">Skill C</text>
  <text x="688" y="403" fill="#94a3b8" font-size="9">仍只有一行 description，没动</text>

  <!-- 小结：上下文占用 -->
  <text x="688" y="448" fill="#34d399" font-size="9" font-weight="600">占用 = 两句话 + B 的一份正文</text>
  <text x="688" y="466" fill="#64748b" font-size="9">没用到的，永远不为它们付窗口</text>

  <!-- ================= 跨区主箭头：命中即加载 ================= -->
  <path d="M 478 275 L 558 275 L 558 252 L 634 252" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="496" y="288" width="124" height="22" rx="11" fill="#0f172a"/>
  <text x="558" y="303" fill="#60a5fa" font-size="10" font-weight="600" text-anchor="middle">命中即加载 →</text>

  <!-- 中间竖向阶段提示 -->
  <text x="558" y="345" fill="#475569" font-size="9" font-weight="600" text-anchor="middle">两个阶段</text>
  <text x="558" y="359" fill="#475569" font-size="9" font-weight="600" text-anchor="middle">按需展开</text>

  <!-- 底部一句话 -->
  <text x="48" y="548" fill="#64748b" font-size="9">关键：description 是常驻的「目录」，正文是按需取用的「菜谱」——上下文只为真正用到的那一份买单。</text>
</svg>
