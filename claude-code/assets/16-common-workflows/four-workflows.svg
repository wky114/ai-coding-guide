<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <style>
      text { font-family: 'JetBrains Mono', 'PingFang SC', 'Noto Sans SC', sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="26" y="38" fill="white" font-size="16" font-weight="700">四个最常用的活儿</text>
  <text x="26" y="58" fill="#94a3b8" font-size="11">探索 / 修 bug / 重构 / 写测试，一格一套打法</text>

  <!-- ===== ① 探索代码库（青） 左上 ===== -->
  <rect x="24" y="82" width="416" height="230" rx="8" fill="#0f172a"/>
  <rect x="24" y="82" width="416" height="230" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="54" cy="114" r="15" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="54" y="119" fill="#67e8f9" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="84" y="110" fill="white" font-size="15" font-weight="600">探索代码库</text>
  <text x="84" y="130" fill="#67e8f9" font-size="10">摸清一个陌生项目</text>
  <line x1="40" y1="146" x2="424" y2="146" stroke="#22d3ee" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="44" y="172" fill="#cbd5e1" font-size="11" font-weight="700">指令模板</text>
  <text x="44" y="196" fill="#94a3b8" font-size="12">「先讲讲这项目整体架构」</text>
  <text x="44" y="218" fill="#94a3b8" font-size="12">「负责 X 的代码在哪、怎么走」</text>
  <line x1="40" y1="240" x2="424" y2="240" stroke="#22d3ee" stroke-width="0.6" stroke-opacity="0.25"/>
  <text x="44" y="268" fill="#cbd5e1" font-size="11"><tspan font-weight="700" fill="#67e8f9">盯紧</tspan>　从面到点，先架构、再定位</text>

  <!-- ===== ② 修 bug（绿） 右上 ===== -->
  <rect x="468" y="82" width="416" height="230" rx="8" fill="#0f172a"/>
  <rect x="468" y="82" width="416" height="230" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="498" cy="114" r="15" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="498" y="119" fill="#6ee7b7" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="528" y="110" fill="white" font-size="15" font-weight="600">修 bug</text>
  <text x="528" y="130" fill="#6ee7b7" font-size="10">从报错到回归测试</text>
  <line x1="484" y1="146" x2="868" y2="146" stroke="#34d399" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="488" y="172" fill="#cbd5e1" font-size="11" font-weight="700">指令模板</text>
  <text x="488" y="196" fill="#94a3b8" font-size="12">「这是报错，这样能复现」</text>
  <text x="488" y="218" fill="#94a3b8" font-size="12">「先找根因，改完补回归测试」</text>
  <line x1="484" y1="240" x2="868" y2="240" stroke="#34d399" stroke-width="0.6" stroke-opacity="0.25"/>
  <text x="488" y="268" fill="#cbd5e1" font-size="11"><tspan font-weight="700" fill="#6ee7b7">盯紧</tspan>　解决根因，别只盖住症状</text>

  <!-- ===== ③ 重构（紫） 左下 ===== -->
  <rect x="24" y="338" width="416" height="230" rx="8" fill="#0f172a"/>
  <rect x="24" y="338" width="416" height="230" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="54" cy="370" r="15" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="54" y="375" fill="#c4b5fd" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="84" y="366" fill="white" font-size="15" font-weight="600">重构</text>
  <text x="84" y="386" fill="#c4b5fd" font-size="10">改结构，不改行为</text>
  <line x1="40" y1="402" x2="424" y2="402" stroke="#a78bfa" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="44" y="428" fill="#cbd5e1" font-size="11" font-weight="700">指令模板</text>
  <text x="44" y="452" fill="#94a3b8" font-size="12">「先讲现状，再定重构目标」</text>
  <text x="44" y="474" fill="#94a3b8" font-size="12">「小步改，改前改后都跑测试」</text>
  <line x1="40" y1="496" x2="424" y2="496" stroke="#a78bfa" stroke-width="0.6" stroke-opacity="0.25"/>
  <text x="44" y="524" fill="#cbd5e1" font-size="11"><tspan font-weight="700" fill="#c4b5fd">盯紧</tspan>　行为不能变，先补测试再动</text>

  <!-- ===== ④ 写测试（琥珀） 右下 ===== -->
  <rect x="468" y="338" width="416" height="230" rx="8" fill="#0f172a"/>
  <rect x="468" y="338" width="416" height="230" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="498" cy="370" r="15" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="498" y="375" fill="#fcd34d" font-size="14" font-weight="700" text-anchor="middle">4</text>
  <text x="528" y="366" fill="white" font-size="15" font-weight="600">写测试</text>
  <text x="528" y="386" fill="#fcd34d" font-size="10">专挑边界情况下手</text>
  <line x1="484" y1="402" x2="868" y2="402" stroke="#fbbf24" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="488" y="428" fill="#cbd5e1" font-size="11" font-weight="700">指令模板</text>
  <text x="488" y="452" fill="#94a3b8" font-size="12">「给这个函数补测试，先列用例」</text>
  <text x="488" y="474" fill="#94a3b8" font-size="12">「重点覆盖边界情况」</text>
  <line x1="484" y1="496" x2="868" y2="496" stroke="#fbbf24" stroke-width="0.6" stroke-opacity="0.25"/>
  <text x="488" y="524" fill="#cbd5e1" font-size="11"><tspan font-weight="700" fill="#fcd34d">盯紧</tspan>　空值 · 零 · 负数 · 类型错误</text>

  <!-- 图例 -->
  <text x="26" y="600" fill="#64748b" font-size="10">四件事不是各干各的：探索摸清地形，修 bug 和重构靠测试兜底，写测试又把前三件的成果钉死。</text>
</svg>
